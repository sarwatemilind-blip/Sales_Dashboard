<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adonis Field Force — Sales Dashboard</title>

<link rel="icon" href="adonis-logo.png" type="image/png" />

<style>
  :root{
    --bg:#0f172a; --panel:#fff; --ink:#0f172a; --muted:#64748b;
    --brand:#2563eb; --brand-dk:#1e3a8a; --good:#16a34a; --bad:#dc2626; --line:#e2e8f0;
    --accent:#f97316; --accent2:#06b6d4; --accent3:#8b5cf6; --accent4:#f43f5e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.16), transparent 28%),
      radial-gradient(circle at top right, rgba(249,115,22,.14), transparent 24%),
      linear-gradient(180deg, #f8fafc 0%, #eef2ff 45%, #fff7ed 100%);
    color:var(--ink);
  }
  .center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:var(--panel);border-radius:18px;box-shadow:0 16px 40px rgba(15,23,42,.10);padding:32px;width:100%;max-width:1040px;border:1px solid rgba(37,99,235,.08);}
  .card h1{font-size:20px;margin:0 0 4px;}
  .card p.sub{color:var(--muted);font-size:13px;margin:0 0 24px;}
  label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;margin-bottom:16px;}
  input:focus{outline:2px solid var(--brand);border-color:var(--brand);}
  button{cursor:pointer;border:none;border-radius:8px;font-weight:600;font-size:14px;padding:11px 16px;}
  .btn-primary{background:var(--brand);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--brand-dk);}
  .btn-ghost{background:transparent;color:var(--brand);border:1px solid var(--line);}
  .err{background:#fef2f2;color:var(--bad);font-size:13px;border-radius:8px;padding:10px 12px;margin-bottom:14px;}
  .ok{background:#f0fdf4;color:var(--good);font-size:13px;border-radius:8px;padding:10px 12px;margin-bottom:14px;}

  header{
    background:linear-gradient(90deg, #0f172a 0%, #1e3a8a 50%, #7c3aed 100%);
    color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    box-shadow:0 6px 20px rgba(15,23,42,.18);
  }
  .brand-lockup{display:flex;align-items:center;gap:12px;min-width:0;}
  .brand-logo{display:block;height:40px;width:auto;flex:0 0 auto;filter:drop-shadow(0 3px 8px rgba(15,23,42,.18));}
  .brand-logo.login{height:56px;}
  header .who{font-size:13px;color:#cbd5e1;}
  header .who b{color:#fff;}
  nav{display:flex;gap:8px;}
  nav button{background:transparent;color:#cbd5e1;padding:8px 14px;border-radius:8px;}
  nav button.active{background:#1e293b;color:#fff;}
  main{max-width:1180px;margin:0 auto;padding:24px;}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px;}
  .kpi{background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 10px 24px rgba(15,23,42,.08);border-top:5px solid var(--brand);}
  .kpi:nth-child(2){border-top-color:var(--accent);}
  .kpi:nth-child(3){border-top-color:var(--accent2);}
  .kpi:nth-child(4){border-top-color:var(--accent3);}
  .kpi .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}
  .kpi .value{font-size:24px;font-weight:700;}
  .kpi .sub{font-size:12px;margin-top:4px;color:var(--muted);}
  .pos{color:var(--good);} .neg{color:var(--bad);}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.06);}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:#f8fafc;color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.03em;}
  tr:last-child td{border-bottom:none;}
  td.num,th.num{text-align:right;}
  .bar-wrap{width:120px;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px;}
  .bar-fill{height:100%;background:var(--brand);}
  .section-title{
    display:inline-flex;align-items:center;gap:8px;
    font-weight:700;font-size:15px;margin:28px 0 10px;
    padding:8px 14px;border-radius:999px;
    background:linear-gradient(90deg, #2563eb, #7c3aed 48%, #f97316);
    color:#fff;box-shadow:0 8px 20px rgba(37,99,235,.18);
  }
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;background:#eef2ff;color:var(--brand-dk);}
  .muted{color:var(--muted);}
  .upload-box{
    background:#fff;border-radius:16px;padding:24px;
    box-shadow:0 10px 24px rgba(15,23,42,.08);
    border:1px solid rgba(37,99,235,.08);
    border-top:5px solid var(--accent2);
  }
  .progress{height:10px;background:#e2e8f0;border-radius:6px;overflow:hidden;margin:14px 0;}
  .progress > div{height:100%;background:var(--good);width:0%;transition:width .2s;}
  .small{font-size:12px;color:var(--muted);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .login-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;align-items:stretch;}
  .login-card{
    border-radius:16px;padding:20px;border:1px solid rgba(37,99,235,.10);
    background:linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(255,255,255,.94) 100%);
    box-shadow:0 10px 24px rgba(15,23,42,.08);
  }
  .login-card.employee{border-top:5px solid var(--brand);}
  .login-card.admin{border-top:5px solid var(--accent);}
  .login-card h2{margin:8px 0 4px;font-size:18px;}
  .login-card .login-note{font-size:12px;color:var(--muted);margin:0 0 16px;}
  .login-badge{
    display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;color:#fff;
    background:linear-gradient(90deg, #2563eb, #7c3aed);
  }
  .login-badge.admin{background:linear-gradient(90deg, #f97316, #ef4444);}
  .team-total-row td{background:linear-gradient(90deg, rgba(37,99,235,.06), rgba(249,115,22,.08)); font-weight:700; border-top:1px solid rgba(37,99,235,.18);}
  .total-chip{display:inline-block;padding:2px 8px;border-radius:999px;background:#fff7ed;color:#9a3412;font-size:11px;font-weight:700;}
  .stock-shell{background:#fff;border-radius:16px;padding:20px;box-shadow:0 10px 24px rgba(15,23,42,.08);border:1px solid rgba(37,99,235,.08);}
  .stock-table th{vertical-align:bottom;}
  .stock-table td{vertical-align:middle;}
  .stock-table .row-head{font-weight:700;}
  .stock-table .row-sub{font-size:12px;color:var(--muted);}
  .stock-table .stock-input{
    width:100%;min-width:90px;padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;
    background:#fff7ed;font-weight:600;
  }
  .stock-table .stock-input:disabled{background:#f8fafc;color:#475569;cursor:not-allowed;}
  .stock-total-row td{background:linear-gradient(90deg, rgba(37,99,235,.06), rgba(249,115,22,.08)); font-weight:700;}
  .stock-note{font-size:12px;color:var(--muted);margin-top:8px;}
  .ocr-modal{
    position:fixed; inset:0; background:rgba(15,23,42,.62); z-index:3000;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .ocr-modal.open{display:flex;}
  .ocr-panel{
    width:min(1160px,100%); max-height:calc(100vh - 40px); overflow:auto;
    background:#fff; border-radius:18px; box-shadow:0 24px 70px rgba(15,23,42,.35);
    border:1px solid rgba(37,99,235,.12); padding:20px;
  }
  .ocr-panel-head{display:flex; gap:14px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap;}
  .ocr-status{min-height:18px;}
  .ocr-review-table th{position:sticky; top:0; z-index:1;}
  .ocr-review-table td, .ocr-review-table th{vertical-align:top;}
  .ocr-review-table .ocr-line{font-size:12px; color:var(--muted); max-width:320px; word-break:break-word;}
  .ocr-review-table select, .ocr-review-table input{margin:0; width:100%;}
  .ocr-review-table .score-chip{
    display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700;
    background:#eef2ff; color:var(--brand-dk);
  }
  .ocr-review-table .score-chip.low{background:#fef2f2;color:var(--bad);}
  @media (max-width: 900px){
    .login-grid{grid-template-columns:1fr;}
  }
</style>
</head>

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let session = null; // { emp_id, name, designation, hq_code, hq_name, manager_emp_id, is_admin }
let downlineIds = [];
let allDownlineEmployees = [];
const app = document.getElementById("app");
const fmtNum = (n) => (n||0).toLocaleString('en-IN', {maximumFractionDigits:0});
const fmtCurrency = (n) => `₹${fmtNum(n)}`;
const fmtPct = (n) => isFinite(n) ? n.toFixed(0) + "%" : "—";
const monthLabel = (n) => (FY_MONTHS.find(m=>m.n===n)||{}).label || n;
const normalizeEmpId = (value) => (value || "").toString().trim().toUpperCase();
const displayHqName = (empId, hqName) => normalizeEmpId(empId) === 'ADLA02' ? 'Mumbai' : (hqName || "—");
const scopeLabel = (emp) => {
  const hq = `${displayHqName(emp.emp_id, emp.hq_name)}${emp.hq_code ? ` [${emp.hq_code}]` : ''}`;
  return `${emp.name || emp.emp_id} (${emp.designation || 'Emp'} · ${hq})`;
};
const DEFAULT_ADMIN = {
  emp_id: 'ADMIN01',
  name: 'Admin User',
  designation: 'ADMIN',
  hq_code: 'S0217',
  hq_name: 'Mumbai',
  manager_emp_id: null,
  is_admin: true
};
const DEFAULT_ADMIN_PASSWORD = 'ADMIN01';

// ---------------- LOGIN ----------------
function renderLogin(errorMsg, mode = "employee"){
  app.innerHTML = `
    <div class="center-screen">
      <div class="card">
        <div style="margin-bottom:18px;">
          <div class="brand-lockup" style="margin-bottom:10px;">
            <img src="adonis-logo.png" alt="Adonis logo" class="brand-logo login" />
            <div>
              <div class="login-badge">Field Sales Dashboard</div>
              <h1 style="margin:10px 0 0;">Adonis Field Force</h1>
            </div>
          </div>
          <p class="sub">Employee and admin access are now separated.</p>
          ${errorMsg ? `<div class="err">${errorMsg}</div>` : ""}
        </div>
        <div class="login-grid">
          <form id="employeeLoginForm" class="login-card employee">
            <div class="login-badge">Employee Login</div>
            <h2>Sign in as field force</h2>
            <p class="login-note">Use your employee ID and password. Admin accounts will be rejected here.</p>
            <label>Employee ID</label>
            <input id="empId" autocomplete="username" placeholder="e.g. ADLA95" required />
            <label>Password</label>
            <input id="password" type="password" autocomplete="current-password" required />
            <button class="btn-primary" type="submit">Employee Sign in</button>
          </form>
          <form id="adminLoginForm" class="login-card admin">
            <div class="login-badge admin">Admin Login</div>
            <h2>Sign in as admin</h2>
            <p class="login-note">Use the admin account only. Normal employee accounts will be rejected here.</p>
            <label>Admin ID</label>
            <input id="adminEmpId" autocomplete="username" />
            <label>Password</label>
            <input id="adminPassword" type="password" autocomplete="current-password" required />
            <button class="btn-primary" type="submit" style="background:linear-gradient(90deg,#f97316,#ef4444);">Admin Sign in</button>
          </form>
        </div>
        <p class="small" style="margin-top:14px;">Default employee password = your Employee ID, unless your admin has changed it. Admin password uses a separate admin-only value.</p>
      </div>
    </div>`;
  document.getElementById("employeeLoginForm").onsubmit = async (e) => {
    e.preventDefault();
    const emp_id = normalizeEmpId(document.getElementById("empId").value);
    const password = document.getElementById("password").value;
    const { data, error } = await sb.rpc('login', { p_emp_id: emp_id, p_password: password });
    if (error || !data || data.length === 0) {
      renderLogin("Invalid Employee ID or password.");
      return;
    }
    if (data[0].is_admin && normalizeEmpId(data[0].emp_id) !== 'ADLA02') {
      renderLogin("Please use the admin login for this account.");
      return;
    }
    session = { ...data[0], is_admin: false, hq_name: displayHqName(data[0].emp_id, data[0].hq_name) };
    await loadDownline();
    renderShell('dashboard');
  };
  document.getElementById("adminLoginForm").onsubmit = async (e) => {
    e.preventDefault();
    const emp_id = normalizeEmpId(document.getElementById("adminEmpId").value);
    const password = document.getElementById("adminPassword").value;
    const { data, error } = await sb.rpc('login', { p_emp_id: emp_id, p_password: password });
    const account = !error && data && data.length > 0 ? data[0] : null;
    const fallbackAdmin = password === DEFAULT_ADMIN_PASSWORD && (
      !emp_id || emp_id === DEFAULT_ADMIN.emp_id
    );
    if (emp_id === 'ADLA02') {
      renderLogin("That account is set up for employee login only.", "admin");
      return;
    }
    if (!account && !fallbackAdmin) {
      renderLogin("Invalid admin ID or password.", "admin");
      return;
    }
    if (account && !account.is_admin && emp_id !== DEFAULT_ADMIN.emp_id) {
      renderLogin("That account is not marked as admin.", "admin");
      return;
    }
    session = account ? { ...account, hq_name: displayHqName(account.emp_id, account.hq_name) } : { ...DEFAULT_ADMIN };
    session.is_admin = true;
    session.hq_name = displayHqName(session.emp_id, session.hq_name);
    await loadDownline();
    renderShell('admin');
  };
}

async function loadDownline(){
  if (session?.is_admin) {
    const { data: emps } = await sb.from('employees').select('emp_id, name, designation, hq_code, hq_name, manager_emp_id, state, region');
    allDownlineEmployees = (emps || []).map(e => ({ ...e, hq_name: displayHqName(e.emp_id, e.hq_name) }));
    downlineIds = allDownlineEmployees.map(e => e.emp_id);
    return;
  }
  const { data, error } = await sb.rpc('downline', { root: session.emp_id });
  downlineIds = (data || []).map(r => r.emp_id);
  if (downlineIds.length === 0) downlineIds = [session.emp_id];

  const { data: emps } = await sb.from('employees').select('emp_id, name, designation, hq_code, hq_name, manager_emp_id, state, region').in('emp_id', downlineIds);
  allDownlineEmployees = (emps || []).map(e => ({ ...e, hq_name: displayHqName(e.emp_id, e.hq_name) }));
}

function logout(){
  session = null; downlineIds = []; allDownlineEmployees = [];
  renderLogin();
}

// ---------------- SHELL ----------------
function renderShell(tab){
  const canAdmin = !!session.is_admin;
  const headerHq = displayHqName(session.emp_id, session.hq_name);
  app.innerHTML = `
    <header>
      <div class="brand-lockup">
        <img src="adonis-logo.png" alt="Adonis logo" class="brand-logo" />
        <div>
        <div style="font-weight:700;">Adonis Field Force — Sales Dashboard</div>
        <div class="who">Logged in as <b>${session.name || session.emp_id}</b> · ${session.designation} ${headerHq ? "· " + headerHq : ""}</div>
        </div>
      </div>
      <nav>
        <button id="navDash" class="${tab==='dashboard'?'active':''}">Dashboard</button>
        <button id="navStock" class="${tab==='stock'?'active':''}">Stock Statement</button>
        ${canAdmin ? `<button id="navAdmin" class="${tab==='admin'?'active':''}">Admin Upload</button>` : ""}
        <button id="navLogout">Logout</button>
      </nav>
    </header>
    <main id="main"></main>
  `;
  document.getElementById("navDash").onclick = () => renderShell('dashboard');
  document.getElementById("navStock").onclick = () => renderShell('stock');
  if (canAdmin) document.getElementById("navAdmin").onclick = () => renderShell('admin');
  document.getElementById("navLogout").onclick = logout;

  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'stock') renderStockStatement();
  else if (tab === 'admin' && canAdmin) renderAdmin();
  else if (tab === 'admin') renderDashboard();
}

// ---------------- DASHBOARD ----------------
const getFiscalMonthNum = (date) => {
  const m = date.getMonth();
  return m >= 3 ? m - 2 : m + 10;
};
const getFiscalYearStart = (date) => {
  const m = date.getMonth();
  const y = date.getFullYear();
  return m >= 3 ? y : y - 1;
};

const defaultDate = new Date("2026-07-03T15:05:41+05:30");
let currentYear = getFiscalYearStart(new Date());
let currentMonth = getFiscalMonthNum(new Date());
if (currentYear < 2025 || currentYear > 2030) {
  currentYear = getFiscalYearStart(defaultDate);
  currentMonth = getFiscalMonthNum(defaultDate);
}
let currentView = 'monthly'; // 'monthly', 'bimonthly', 'mtd', 'ytd'
let selectedEmpId = 'overall';
let selectedStockistCode = 'all';
let lastDashboardData = { kpis: [], brands: [], team: [] };
let lastStockStatementData = { rows: [], scopeEmpId: 'overall', year: currentYear, month: currentMonth, grandTotals: null };

const prevFiscalPeriod = (year, month) => month === 1 ? { year: year - 1, month: 12 } : { year, month: month - 1 };
const nextFiscalPeriod = (year, month) => month === 12 ? { year: year + 1, month: 1 } : { year, month: month + 1 };
const periodKey = (year, month) => `${year}-${String(month).padStart(2, '0')}`;
const statementDomKey = (stockistCode, productCode) => encodeURIComponent(`${stockistCode}||${productCode}`);
let stockOcrState = { file: null, rows: [], stockistCode: '', stockistName: '', status: '' };

async function saveAllStockStatementEntries({ silent = false } = {}) {
  const rows = (lastStockStatementData.rows || []);
  const scopeKey = lastStockStatementData.scopeEmpId || selectedEmpId || 'overall';
  const targetYear = lastStockStatementData.year || currentYear;
  const targetMonth = lastStockStatementData.month || currentMonth;
  const payloads = [];
  for (const row of rows) {
    const rowKey = statementDomKey(row.stockist_code, row.product_code);
    const openingInput = document.getElementById(`stockOpening_${rowKey}`);
    const secondaryInput = document.getElementById(`stockSecondary_${rowKey}`);
    const openingRaw = row.openingEditable ? (openingInput?.value ?? '').trim() : '';
    const secondaryRaw = (secondaryInput?.value ?? '').trim();
    const openingUnits = row.openingEditable
      ? (openingRaw !== '' ? (parseFloat(openingRaw) || 0) : row.openingUnits)
      : row.openingUnits;
    const secondaryUnits = secondaryRaw !== ''
      ? (parseFloat(secondaryRaw) || 0)
      : (row.saved ? (parseFloat(row.secondaryUnits) || 0) : 0);
    payloads.push({
      scope_emp_id: scopeKey,
      period_year: targetYear,
      period_month: targetMonth,
      stockist_code: row.stockist_code,
      stockist_name: row.stockist_name,
      product_code: row.product_code,
      product_name: row.product_name,
      brand: row.brand,
      opening_units: Number.isFinite(openingUnits) ? openingUnits : row.openingUnits,
      primary_units: row.primaryUnits,
      primary_value: row.primaryValue,
      sale_rate: row.saleRate,
      total_units: row.totalUnits,
      secondary_units: secondaryUnits,
      secondary_value: secondaryUnits * row.saleRate,
      closing_units: row.totalUnits - secondaryUnits,
      closing_value: (row.totalUnits - secondaryUnits) * row.saleRate,
      updated_by: session.emp_id,
      updated_at: new Date().toISOString()
    });
  }
  if (!payloads.length) {
    if (!silent) alert('Nothing to save.');
    return false;
  }
  const { error } = await sb.from('stock_statement_items').upsert(payloads, { onConflict: 'scope_emp_id,period_year,period_month,stockist_code,product_code' });
  if (error) {
    if (!silent) alert('Failed to save statement: ' + error.message);
    return false;
  }
  const nextPeriod = nextFiscalPeriod(targetYear, targetMonth);
  const carryForwardPayloads = payloads.map(row => ({
    scope_emp_id: row.scope_emp_id,
    period_year: nextPeriod.year,
    period_month: nextPeriod.month,
    stockist_code: row.stockist_code,
    product_code: row.product_code,
    opening_units: row.closing_units,
    sale_rate: row.sale_rate,
    total_units: row.closing_units,
    closing_units: row.closing_units,
    closing_value: row.closing_value,
    updated_by: session.emp_id,
    updated_at: new Date().toISOString()
  }));
  const { error: carryError } = await sb.from('stock_statement_items').upsert(carryForwardPayloads, { onConflict: 'scope_emp_id,period_year,period_month,stockist_code,product_code' });
  if (carryError) {
    if (!silent) alert('Saved current month, but could not carry forward opening to next month: ' + carryError.message);
    return false;
  }
  return true;
}

function getActiveScopeIdsForSelection() {
  if (selectedEmpId === 'overall') return [...downlineIds];
  const list = [selectedEmpId];
  let added = true;
  while (added) {
    added = false;
    allDownlineEmployees.forEach(e => {
      if (e.manager_emp_id && list.includes(e.manager_emp_id) && !list.includes(e.emp_id)) {
        list.push(e.emp_id);
        added = true;
      }
    });
  }
  return list;
}

function buildScopeOptionsHTML(selectedValue) {

  const bes = allDownlineEmployees.filter(e => e.designation === 'BE').sort((a,b) => (a.name||a.emp_id).localeCompare(b.name||b.emp_id));
  let html = `<option value="overall" ${selectedValue === 'overall' ? 'selected' : ''}>Overall Scope (${scopeLabel(session)})</option>`;
  if (managers.length > 0) {
    html += `<optgroup label="Managers">`;
    managers.forEach(m => {
      html += `<option value="${m.emp_id}" ${selectedValue===m.emp_id?'selected':''}>${scopeLabel(m)}</option>`;
    });
    html += `</optgroup>`;
  }
  if (bes.length > 0) {
    html += `<optgroup label="Field Force (BE)">`;
    bes.forEach(b => {
      html += `<option value="${b.emp_id}" ${selectedValue===b.emp_id?'selected':''}>${scopeLabel(b)}</option>`;
    });
    html += `</optgroup>`;
  }
  return html;
}

function getStockOcrProducts() {
  const seen = new Map();
  (lastStockStatementData.rows || []).forEach(row => {
    if (!seen.has(row.product_code)) {
      seen.set(row.product_code, {
        product_code: row.product_code,
        product_name: row.product_name,
        brand: row.brand || row.product_name
      });
    }
  });
  return [...seen.values()].sort((a, b) => a.product_name.localeCompare(b.product_name));
}

function scoreOcrProductLine(line, product) {
  const normalizedLine = normalizeEmpId(line).replace(/[^A-Z0-9]+/g, '');
  const normalizedName = normalizeEmpId(product.product_name).replace(/[^A-Z0-9]+/g, '');
  const normalizedCode = normalizeEmpId(product.product_code).replace(/[^A-Z0-9]+/g, '');
  if (!normalizedLine) return 0;
  if (normalizedLine === normalizedName || normalizedLine === normalizedCode) return 100;
  let score = 0;
  if (normalizedName && normalizedLine.includes(normalizedName)) score = Math.max(score, 90);
  if (normalizedCode && normalizedLine.includes(normalizedCode)) score = Math.max(score, 85);
  const tokens = (product.product_name || '').toUpperCase().split(/[^A-Z0-9]+/).filter(t => t.length > 1);
  let hits = 0;
  tokens.forEach(token => {
    if (normalizedLine.includes(token)) hits += 1;
  });
  if (hits > 0) score = Math.max(score, 45 + hits * 10);
  return score;
}

function suggestOcrProduct(line, products) {
  let best = { score: 0, product: null };
  products.forEach(product => {
    const score = scoreOcrProductLine(line, product);
    if (score > best.score) best = { score, product };
  });
  return best;
}

function isOcrNumericWord(wordText) {
  return /^-?\d+(?:\.\d+)?$/.test((wordText || '').trim());
}

function buildLinesFromTextItems(items, getY, getX0, getX1, getText) {
  const lines = [];
  const tolerance = 4;
  (items || []).forEach(item => {
    const text = (getText ? getText(item) : item?.text || item?.str || '').toString().trim();
    if (!text) return;
    const x0 = Number.isFinite(getX0 ? getX0(item) : item?.x0) ? (getX0 ? getX0(item) : item.x0) : 0;
    const x1 = Number.isFinite(getX1 ? getX1(item) : item?.x1) ? (getX1 ? getX1(item) : item.x1) : x0;
    const y0 = Number.isFinite(getY ? getY(item) : item?.y) ? (getY ? getY(item) : item.y) : 0;
    let line = lines.find(entry => Math.abs(entry.y - y0) <= tolerance);
    if (!line) {
      line = { y: y0, words: [] };
      lines.push(line);
    }
    line.words.push({
      text,
      bbox: {
        x0,
        x1,
        y0: y0 - 10,
        y1: y0 + 10,
      }
    });
  });
  lines.forEach(line => {
    line.words.sort((a, b) => (a.bbox?.x0 || 0) - (b.bbox?.x0 || 0));
    line.text = line.words.map(word => word.text || '').join(' ').replace(/\s+/g, ' ').trim();
    const xs = line.words.map(word => [word.bbox?.x0 || 0, word.bbox?.x1 || 0]).flat();
    line.bbox = xs.length ? {
      x0: Math.min(...xs),
      x1: Math.max(...xs),
      y0: line.y - 10,
      y1: line.y + 10,
    } : null;
  });
  return lines.sort((a, b) => b.y - a.y);
}

function buildLinesFromPdfTextItems(items) {
  return buildLinesFromTextItems(
    items,
    item => (item && item.transform && item.transform[5] != null) ? item.transform[5] : 0,
    item => (item && item.transform && item.transform[4] != null) ? item.transform[4] : 0,
    item => ((item && item.transform && item.transform[4] != null) ? item.transform[4] : 0) + (item?.width || 0),
    item => item?.str || ''
  );
}

function getLineObjectsFromPageData(pageData) {
  const lines = [];
  (pageData?.blocks || []).forEach(block => {
    (block.paragraphs || []).forEach(paragraph => {
      (paragraph.lines || []).forEach(line => lines.push(line));
    });
  });
  return lines;
}

function findIssueColumnInfo(lines) {
  const allLines = Array.isArray(lines) ? lines : [];
  const maxY = allLines.reduce((max, line) => Math.max(max, Number.isFinite(line?.y) ? line.y : (line?.bbox?.y1 || 0)), 0);
  const headerCutoff = maxY > 0 ? maxY * 0.45 : null;
  const issueLines = allLines
    .filter(line => /issue/i.test(line.text || ''))
    .filter(line => headerCutoff == null || (Number.isFinite(line?.y) ? line.y : (line?.bbox?.y0 || 0)) <= headerCutoff)
    .sort((a, b) => (a.y || a.bbox?.y0 || 0) - (b.y || b.bbox?.y0 || 0));
  if (!issueLines.length) return { issueX: null, nextX: null };
  const issueWords = issueLines.flatMap(line => (line.words || []).filter(word => /issue/i.test(word.text || '')));
  let issueX = null;
  if (issueWords.length > 0) {
    const centers = issueWords
      .map(word => ((word.bbox?.x0 || 0) + (word.bbox?.x1 || 0)) / 2)
      .filter(Number.isFinite);
    if (centers.length > 0) issueX = centers.reduce((a, b) => a + b, 0) / centers.length;
  }
  const issueLine = issueLines.find(line => /qty|sales|retm|expiry|closing/i.test(line.text || '')) || issueLines[0];
  if (issueX == null && issueLine?.bbox) issueX = (issueLine.bbox.x0 + issueLine.bbox.x1) / 2;

  const headerLine = issueLines.find(line => /qty|retm|expiry|closing/i.test(line.text || '')) || issueLines[0] || null;
  let nextX = null;
  if (headerLine) {
    const headerWords = (headerLine.words || []).filter(word => /issue|qty|retm|expiry|closing/i.test(word.text || ''));
    if (issueX != null && headerWords.length > 0) {
      const issueIdx = headerWords.findIndex(word => /issue/i.test(word.text || ''));
      const rightWords = issueIdx >= 0 ? headerWords.slice(issueIdx + 1) : headerWords;
      const nextWord = rightWords.find(word => /retm|expiry|closing/i.test(word.text || '')) || rightWords.find(word => /qty/i.test(word.text || ''));
      if (nextWord?.bbox) nextX = (nextWord.bbox.x0 + nextWord.bbox.x1) / 2;
    }
  }
  return { issueX, nextX };
}

function getLineWordsText(line) {
  return (line.words || []).map(word => word.text || '').join(' ').replace(/\s+/g, ' ').trim();
}

function chooseIssueQtyFromLine(line, issueInfo) {
  const issueX = issueInfo?.issueX ?? null;
  const nextX = issueInfo?.nextX ?? null;
  const numericWords = (line.words || [])
    .filter(word => isOcrNumericWord(word.text))
    .map(word => ({
      word,
      text: word.text.trim(),
      cx: word.bbox ? ((word.bbox.x0 + word.bbox.x1) / 2) : 0,
      width: word.bbox ? Math.abs(word.bbox.x1 - word.bbox.x0) : 0
    }))
    .sort((a, b) => a.cx - b.cx);
  if (!numericWords.length) return null;

  const middleFallback = numericWords[Math.floor(numericWords.length / 2)] || numericWords[0];
  const bandLeft = issueX == null ? null : issueX - 80;
  const bandRight = nextX == null ? null : nextX - 20;
  const issueBand = issueX == null
    ? numericWords
    : numericWords.filter(item => item.cx >= (bandLeft ?? issueX - 80) && (bandRight == null || item.cx <= bandRight));
  const pool = issueBand.length ? issueBand : numericWords;
  const chosen = pool.reduce((best, item) => {
    if (!best) return item;
    if (issueX == null) {
      const itemGap = Math.abs(item.cx - middleFallback.cx);
      const bestGap = Math.abs(best.cx - middleFallback.cx);
      if (itemGap !== bestGap) return itemGap < bestGap ? item : best;
      return item.cx < best.cx ? item : best;
    }
    const itemGap = Math.abs(item.cx - issueX);
    const bestGap = Math.abs(best.cx - issueX);
    if (itemGap !== bestGap) return itemGap < bestGap ? item : best;
    return item.cx < best.cx ? item : best;
  }, null);
  return chosen ? chosen.text : (middleFallback ? middleFallback.text : null);
}

function extractStockRowsFromLineObjects(lineItems, products) {
  const rows = [];
  const seen = new Set();
  const issueInfo = findIssueColumnInfo(lineItems);

  lineItems.forEach(line => {
    const lineText = getLineWordsText(line) || (line.text || '').replace(/\s+/g, ' ').trim();
    if (!lineText || lineText.length < 3) return;
    if (/issue\s*qty/i.test(lineText) || /opening|closing|total|statement|page\s*no/i.test(lineText)) return;
    const qtyText = chooseIssueQtyFromLine(line, issueInfo);
    if (!qtyText) return;
    const qty = parseFloat(qtyText);
    if (!Number.isFinite(qty)) return;

    const numericWords = (line.words || []).filter(word => isOcrNumericWord(word.text));
    const qtyWord = numericWords.find(word => (word.text || '').trim() === qtyText);
    const labelWords = (line.words || [])
      .filter(word => !isOcrNumericWord(word.text))
      .filter(word => {
        if (!qtyWord || !word.bbox || !qtyWord.bbox) return true;
        return (word.bbox.x1 || 0) < ((qtyWord.bbox.x0 || 0) - 8);
      })
      .map(word => word.text || '')
      .filter(Boolean);
    const label = labelWords.join(' ').replace(/\s+/g, ' ').trim() || lineText;
    const suggestion = suggestOcrProduct(label, products);
    const normalizedLabel = normalizeEmpId(label);
    const exactCodeMatch = products.some(product => normalizedLabel.includes(normalizeEmpId(product.product_code)));
    const startsLikeProduct = products.some(product => {
      const productLead = normalizeEmpId(product.product_name).split(/[^A-Z0-9]+/).find(Boolean);
      return productLead && normalizedLabel.startsWith(productLead);
    });
    const acceptRow = suggestion.score >= 70 || (suggestion.score >= 45 && (exactCodeMatch || startsLikeProduct));
    if (!acceptRow) return;
    const key = `${normalizeEmpId(label)}|${qty}|${suggestion.product ? suggestion.product.product_code : ''}`;
    if (seen.has(key)) return;
    seen.add(key);
    rows.push({
      id: `ocr_${rows.length + 1}`,
      rawText: lineText,
      label,
      qty,
      suggestedProductCode: suggestion.product ? suggestion.product.product_code : '',
      suggestedProductName: suggestion.product ? suggestion.product.product_name : '',
      score: suggestion.score
    });
  });
  return rows;
}

function extractStockRowsFromPdfTextItems(items, products) {
  return extractStockRowsFromLineObjects(buildLinesFromPdfTextItems(items), products);
}

function extractStockRowsFromPageData(pageData, products) {
  return extractStockRowsFromLineObjects(getLineObjectsFromPageData(pageData), products);
}

function parseStockOcrText(text, products, pageData = null) {
  const skipPatterns = [
    /^page\s*\d+/i,
    /^page\s+no\b/i,
    /^total\b/i,
    /^grand total\b/i,
    /^opening\b/i,
    /^closing\b/i,
    /^primary\b/i,
    /^secondary\b/i,
    /^statement\b/i,
    /^stock\b/i,
    /sales\s*&\s*stock\s*statement/i,
    /\b(from|upto)\s*\d{1,2}\/\d{1,2}\/\d{4}\b/i,
    /\baddress\b/i,
    /\bphone\b/i,
    /\bmobile\b/i,
    /\bgst\b/i,
    /\btax\b/i,
    /\binvoice\b/i,
    /\bbill\b/i
  ];
  const rows = [];
  const seen = new Set();
  if (pageData) {
    return extractStockRowsFromPageData(pageData, products);
  }
  (text || '').split(/\r?\n/).map(line => line.replace(/\s+/g, ' ').trim()).forEach(line => {
    if (!line || line.length < 3) return;
    if (skipPatterns.some(rx => rx.test(line))) return;
    const numberMatches = [...line.matchAll(/-?\d+(?:\.\d+)?/g)].map(match => {
      const start = match.index || 0;
      const end = start + match[0].length;
      const suffix = line.slice(end).trimStart().toUpperCase();
      return {
        raw: match[0],
        index: start,
        isDecimal: match[0].includes('.'),
        isInteger: !match[0].includes('.'),
        isPackLike: /^(?:'S|S|MG|GM|ML|L|TAB|TABS|CAP|PCS|NOS|NO)\b/.test(suffix),
      };
    });
    const firstDecimalIdx = numberMatches.findIndex(tok => tok.isDecimal);
    const searchTokens = firstDecimalIdx >= 0 ? numberMatches.slice(firstDecimalIdx + 1) : numberMatches;
    const qtyToken = searchTokens.find(tok => tok.isInteger && !tok.isPackLike);
    if (!qtyToken) return;
    const qty = parseFloat(qtyToken.raw);
    if (!Number.isFinite(qty)) return;
    const labelEnd = qtyToken.index != null ? qtyToken.index : line.length;
    const label = line.slice(0, labelEnd).trim();
    if (!label) return;
    const suggestion = suggestOcrProduct(label, products);
    const normalizedLabel = normalizeEmpId(label);
    const exactCodeMatch = products.some(product => normalizedLabel.includes(normalizeEmpId(product.product_code)));
    const startsLikeProduct = products.some(product => {
      const productLead = normalizeEmpId(product.product_name).split(/[^A-Z0-9]+/).find(Boolean);
      return productLead && normalizedLabel.startsWith(productLead);
    });
    const acceptRow = suggestion.score >= 70 || (suggestion.score >= 45 && (exactCodeMatch || startsLikeProduct));
    if (!acceptRow) return;
    const key = `${normalizeEmpId(label)}|${qty}|${suggestion.product ? suggestion.product.product_code : ''}`;
    if (seen.has(key)) return;
    seen.add(key);
    rows.push({
      id: `ocr_${rows.length + 1}`,
      rawText: line,
      label,
      qty,
      suggestedProductCode: suggestion.product ? suggestion.product.product_code : '',
      suggestedProductName: suggestion.product ? suggestion.product.product_name : '',
      score: suggestion.score
    });
  });
  return rows;
}

function renderStockOcrReview(rows, products) {
  const wrap = document.getElementById('stockOcrReviewWrap');
  const applyBtn = document.getElementById('stockOcrApplyBtn');
  if (!wrap) return;
  if (!rows || rows.length === 0) {
    wrap.innerHTML = `<div class="muted" style="padding:12px 0;">No product-like rows were found. Try a cleaner PDF or image, then scan again.</div>`;
    if (applyBtn) applyBtn.disabled = true;
    return;
  }
  const productOptions = [`<option value="">Select product</option>`].concat(products.map(p => `<option value="${p.product_code}">${p.product_name} (${p.product_code})</option>`)).join('');
  wrap.innerHTML = `
    <table class="ocr-review-table" style="width:100%; min-width:960px;">
      <thead>
        <tr>
          <th style="width:34%;">OCR Text</th>
          <th style="width:16%;" class="num">Qty</th>
          <th style="width:14%;">Score</th>
          <th style="width:36%;">Map To Product</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(row => `
          <tr data-ocr-row-id="${row.id}">
            <td>
              <div class="ocr-line">${row.rawText}</div>
              <div class="small">Suggested: ${row.suggestedProductName || 'No clear match'}</div>
            </td>
            <td class="num">
              <input class="ocr-qty" type="number" step="0.01" min="0" value="${row.qty}" />
            </td>
            <td>
              <span class="score-chip ${row.score < 60 ? 'low' : ''}">${row.score}%</span>
            </td>
            <td>
              <select class="ocr-product">${productOptions}</select>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  wrap.querySelectorAll('tr[data-ocr-row-id]').forEach(tr => {
    const rowId = tr.getAttribute('data-ocr-row-id');
    const row = rows.find(r => r.id === rowId);
    const productSelect = tr.querySelector('.ocr-product');
    if (row && productSelect) productSelect.value = row.suggestedProductCode || '';
  });
  if (applyBtn) applyBtn.disabled = false;
}

async function renderImageToCanvas(file) {
  const url = URL.createObjectURL(file);
  try {
    const image = new Image();
    image.src = url;
    await image.decode();
    const canvas = document.createElement('canvas');
    canvas.width = image.naturalWidth;
    canvas.height = image.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    return canvas;
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function scanStockOcrFile(file) {
  if (!file) return;
  const status = document.getElementById('stockOcrStatus');
  const progress = document.getElementById('stockOcrProgress');
  const reviewWrap = document.getElementById('stockOcrReviewWrap');
  const applyBtn = document.getElementById('stockOcrApplyBtn');
  const stockistSel = document.getElementById('stockOcrStockistSel');
  const products = getStockOcrProducts();
  let ocrWorker = null;
  if (!products.length) {
    if (status) status.textContent = 'Load the stock statement first so OCR can map rows to products.';
    return;
  }
  if (status) status.textContent = `Scanning ${file.name}...`;
  if (progress) progress.style.width = '8%';
  if (applyBtn) applyBtn.disabled = true;
  if (reviewWrap) reviewWrap.innerHTML = '<div class="muted">Scanning file...</div>';
  let extractedText = '';
  const extractedRows = [];
  const getOcrWorker = async () => {
    if (ocrWorker) return ocrWorker;
    ocrWorker = await Tesseract.createWorker('eng');
    return ocrWorker;
  };
  try {
    if (/pdf/i.test(file.type) || file.name.toLowerCase().endsWith('.pdf')) {
      const pdfjsLib = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.mjs');
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.mjs';
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
        if (status) status.textContent = `Scanning ${file.name} - page ${pageNumber}/${pdf.numPages}...`;
        if (progress) progress.style.width = `${Math.round((pageNumber - 1) / pdf.numPages * 70) + 10}%`;
        const page = await pdf.getPage(pageNumber);
        const textContent = await page.getTextContent();
        const pdfRows = extractStockRowsFromPdfTextItems(textContent.items || [], products);
        if (pdfRows.length) {
          extractedRows.push(...pdfRows);
          extractedText += `\n${(textContent.items || []).map(item => item.str || '').join(' ')}`;
          continue;
        }
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;
        const dataUrl = canvas.toDataURL('image/png');
        const worker = await getOcrWorker();
        const result = await worker.recognize(dataUrl, {}, { blocks: true, tsv: true });
        extractedText += `\n${result.data.text || ''}`;
        extractedRows.push(...parseStockOcrText(result.data.text || '', products, result.data));
      }
    } else {
      const canvas = await renderImageToCanvas(file);
      const worker = await getOcrWorker();
      const result = await worker.recognize(canvas.toDataURL('image/png'), {}, { blocks: true, tsv: true });
      extractedText = result.data.text || '';
      extractedRows.push(...parseStockOcrText(extractedText, products, result.data));
    }
    const rows = extractedRows.length ? extractedRows : parseStockOcrText(extractedText, products);
    stockOcrState = {
      ...stockOcrState,
      file,
      rows,
      stockistCode: stockistSel ? stockistSel.value : '',
      stockistName: stockistSel && stockistSel.selectedOptions[0] ? stockistSel.selectedOptions[0].textContent : ''
    };
    renderStockOcrReview(rows, products);
    if (status) status.textContent = rows.length ? `Found ${rows.length} candidate rows. Review the mapping and then apply.` : 'No candidate product rows were found in the file.';
    if (progress) progress.style.width = '100%';
  } catch (error) {
    if (reviewWrap) reviewWrap.innerHTML = '';
    if (status) status.textContent = `OCR failed: ${error.message}`;
    if (progress) progress.style.width = '0%';
  } finally {
    if (ocrWorker) {
      try {
        await ocrWorker.terminate();
      } catch (terminateError) {
        console.warn('Failed to terminate OCR worker', terminateError);
      }
    }
  }
}

async function applyStockOcrReview() {
  const status = document.getElementById('stockOcrStatus');
  const progress = document.getElementById('stockOcrProgress');
  const stockistSel = document.getElementById('stockOcrStockistSel');
  try {
    const rows = Array.from(document.querySelectorAll('#stockOcrReviewWrap tr[data-ocr-row-id]')).map(tr => ({
      rowId: tr.getAttribute('data-ocr-row-id'),
      qty: parseFloat(tr.querySelector('.ocr-qty')?.value || '0') || 0,
      productCode: tr.querySelector('.ocr-product')?.value || ''
    })).filter(r => r.qty > 0 && r.productCode);
    if (!rows.length) {
      if (status) status.textContent = 'No mapped rows to apply.';
      return;
    }
    const scopeKey = selectedEmpId || 'overall';
    const targetYear = currentYear;
    const targetMonth = currentMonth;
    const selectedStockist = stockistSel ? stockistSel.value : '';
    if (!selectedStockist) {
      if (status) status.textContent = 'Please choose a stockist before applying OCR values.';
      return;
    }

    const rowMap = new Map((lastStockStatementData.rows || []).map(row => [`${normalizeEmpId(row.stockist_code)}|${normalizeEmpId(row.product_code)}`, row]));
    const payloads = [];
    const grouped = new Map();
    rows.forEach(r => {
      const key = `${normalizeEmpId(selectedStockist)}|${normalizeEmpId(r.productCode)}`;
      grouped.set(key, (grouped.get(key) || 0) + r.qty);
    });

    if (status) status.textContent = 'Preparing reviewed rows...';
    if (progress) progress.style.width = '20%';

    for (const [key, qty] of grouped.entries()) {
      const row = rowMap.get(key);
      if (!row) continue;
      const openingInput = document.getElementById(`stockOpening_${row.key}`);
      const openingUnits = row.openingEditable
        ? (Number.isFinite(parseFloat(openingInput?.value)) ? parseFloat(openingInput?.value) : row.openingUnits)
        : row.openingUnits;
      payloads.push({
        scope_emp_id: scopeKey,
        period_year: targetYear,
        period_month: targetMonth,
        stockist_code: row.stockist_code,
        stockist_name: row.stockist_name,
        product_code: row.product_code,
        product_name: row.product_name,
        brand: row.brand,
        opening_units: Number.isFinite(openingUnits) ? openingUnits : row.openingUnits,
        primary_units: row.primaryUnits,
        primary_value: row.primaryValue,
        sale_rate: row.saleRate,
        total_units: row.totalUnits,
        secondary_units: qty,
        secondary_value: qty * row.saleRate,
        closing_units: row.totalUnits - qty,
        closing_value: (row.totalUnits - qty) * row.saleRate,
        updated_by: session.emp_id,
        updated_at: new Date().toISOString()
      });
    }

    if (!payloads.length) {
      if (status) status.textContent = 'No matching stock rows were found to save.';
      return;
    }

    if (status) status.textContent = `Saving ${payloads.length} reviewed rows...`;
    if (progress) progress.style.width = '45%';
    const { error } = await sb.from('stock_statement_items').upsert(payloads, { onConflict: 'scope_emp_id,period_year,period_month,stockist_code,product_code' });
    if (error) {
      if (status) status.textContent = `Failed to apply OCR values: ${error.message}`;
      return;
    }
    if (status) status.textContent = `Applied ${payloads.length} reviewed rows.`;
    if (progress) progress.style.width = '100%';
    closeStockOcrModal();
    await loadStockStatementData();
  } catch (error) {
    if (status) status.textContent = `Could not save OCR values: ${error.message}`;
    if (progress) progress.style.width = '0%';
    console.error('applyStockOcrReview failed', error);
  }
}

const BRAND_CATEGORIES = {
  "ARDEN 325": "Pillar",
  "ARDEN 650": "Pillar",
  "ARDEN MF SUSPENSION": "Pillar",
  "COLDAID +": "Pillar",
  "COLDAID SUSPENSION": "Pillar",
  "MV 30 SYRUP": "Pillar",
  "MV 30 TAB": "Pillar",
  "ORT+": "Pillar",
  "SERVIL JUNIOR": "Pillar",
  "SERVIL-D": "Pillar",
  "SERVIL-LS JUNIOR": "Pillar",
  "SERVIL-LS SYRUP": "Pillar"
};

const getBrandCategory = (brandName) => {
  if (!brandName) return "Others";
  const norm = brandName.toString().trim().toUpperCase();
  for (const k in BRAND_CATEGORIES) {
    if (k.toUpperCase() === norm) {
      return BRAND_CATEGORIES[k];
    }
  }
  return "Others";
};

async function loadDashboardData(){
  const body = document.getElementById("dashBody");
  body.innerHTML = `<p class="muted">Loading…</p>`;

  let activeScopeIds = [];
  if (selectedEmpId === 'overall') {
    activeScopeIds = downlineIds;
  } else {
    const list = [selectedEmpId];
    let added = true;
    while (added) {
      added = false;
      allDownlineEmployees.forEach(e => {
        if (e.manager_emp_id && list.includes(e.manager_emp_id) && !list.includes(e.emp_id)) {
          list.push(e.emp_id);
          added = true;
        }
      });
    }
    activeScopeIds = list;
  }

  const pill = document.getElementById("scopePill");
  if (pill) {
    pill.textContent = `${activeScopeIds.length} employee${activeScopeIds.length>1?'s':''} in scope`;
  }

  let months = [];
  let periodLabel = "";
  if (currentView === 'bimonthly') {
    const startMonth = currentMonth % 2 === 1 ? currentMonth : currentMonth - 1;
    months = [startMonth, startMonth + 1];
    periodLabel = `${monthLabel(startMonth)}-${monthLabel(startMonth + 1)}`;
  } else if (currentView === 'ytd') {
    months = Array.from({length: currentMonth}, (_, i) => i + 1);
    periodLabel = `YTD (Apr-${monthLabel(currentMonth)})`;
  } else if (currentView === 'mtd') {
    months = [currentMonth];
    periodLabel = `MTD (${monthLabel(currentMonth)})`;
  } else {
    months = [currentMonth];
    periodLabel = monthLabel(currentMonth);
  }

  // Helper to fetch all rows using pagination (overcoming the 1000-row PostgREST limit)
  async function fetchAllRows(tableName, filterCol, yearCol, monthCol, yVal, monthsVal) {
    let allData = [];
    let from = 0;
    const orderCol = tableName === 'targets' ? 'id' : 'sale_id';
    while (true) {
      const { data, error } = await sb.from(tableName)
        .select('*')
        .in(filterCol, activeScopeIds)
        .eq(yearCol, yVal)
        .in(monthCol, monthsVal)
        .order(orderCol)
        .range(from, from + 999);
      if (error) {
        console.error("Error loading " + tableName, error);
        break;
      }
      allData = allData.concat(data);
      if (data.length < 1000) break;
      from += 1000;
    }
    return allData;
  }

  const [tgt, ach, lastYear] = await Promise.all([
    fetchAllRows('targets', 'emp_id', 'year', 'month_num', currentYear, months),
    fetchAllRows('sales_attributed', 'be_emp_id', 'period_year', 'period_month', currentYear, months),
    fetchAllRows('sales_attributed', 'be_emp_id', 'period_year', 'period_month', currentYear - 1, months)
  ]);

  // Setup Date / MTD prorating constants
  const todayDateObj = new Date();
  const referenceDate = (todayDateObj.getFullYear() < 2025 || todayDateObj.getFullYear() > 2030) ? defaultDate : todayDateObj;
  const todayStr = referenceDate.toISOString().slice(0, 10);
  const lastYearTodayStr = new Date(referenceDate.getFullYear() - 1, referenceDate.getMonth(), referenceDate.getDate()).toISOString().slice(0, 10);

  const daysInMonth = new Date(referenceDate.getFullYear(), referenceDate.getMonth() + 1, 0).getDate();
  const elapsedDays = referenceDate.getDate();
  const mtdRatio = elapsedDays / daysInMonth;

  let targetMultiplier = 1.0;
  let filteredAch = ach;
  let filteredLastYear = lastYear;

  if (currentView === 'mtd') {
    filteredAch = ach.filter(r => !r.bill_date || r.bill_date <= todayStr);
    filteredLastYear = lastYear.filter(r => !r.bill_date || r.bill_date <= lastYearTodayStr);
  }

  const sum = (rows, key) => rows.reduce((a,r) => a + (parseFloat(r[key])||0), 0);
  const totalTargetVal = sum(tgt, 'val_target_per_be') * 100000 * targetMultiplier;
  const totalTargetUnit = Math.round(sum(tgt, 'unit_target_per_be') * targetMultiplier);
  const totalAchVal = sum(filteredAch, 'amount');
  const totalAchUnit = sum(filteredAch, 'quantity');
  const totalLastYearVal = sum(filteredLastYear, 'amount');
  const growthVal = totalLastYearVal > 0 ? ((totalAchVal - totalLastYearVal) / totalLastYearVal * 100) : null;

  // Save for Excel export
  lastDashboardData.kpis = [
    { "Metric": "Target (Value)", "Value": totalTargetVal },
    { "Metric": "Achievement (Value)", "Value": totalAchVal },
    { "Metric": "% Achievement", "Value": totalTargetVal > 0 ? (totalAchVal / totalTargetVal * 100).toFixed(1) + "%" : "—" },
    { "Metric": "Growth vs Last Year", "Value": growthVal !== null ? growthVal.toFixed(1) + "%" : "—" }
  ];

  // Category-wise rollups
  const categorySummary = {
    Pillar: { targetVal: 0, achVal: 0, lastYearVal: 0 },
    Others: { targetVal: 0, achVal: 0, lastYearVal: 0 }
  };

  tgt.forEach(r => {
    const cat = getBrandCategory(r.brand);
    categorySummary[cat].targetVal += (parseFloat(r.val_target_per_be)||0) * 100000 * targetMultiplier;
  });

  filteredAch.forEach(r => {
    const cat = getBrandCategory(r.brand);
    categorySummary[cat].achVal += parseFloat(r.amount)||0;
  });

  filteredLastYear.forEach(r => {
    const cat = getBrandCategory(r.brand);
    categorySummary[cat].lastYearVal += parseFloat(r.amount)||0;
  });

  lastDashboardData.categories = [
    {
      "Category": "Pillar Brands",
      "Target": categorySummary.Pillar.targetVal,
      "Achievement": categorySummary.Pillar.achVal,
      "% Achievement": categorySummary.Pillar.targetVal > 0 ? (categorySummary.Pillar.achVal / categorySummary.Pillar.targetVal * 100).toFixed(1) + "%" : "—",
      "Growth YoY": categorySummary.Pillar.lastYearVal > 0 ? ((categorySummary.Pillar.achVal - categorySummary.Pillar.lastYearVal) / categorySummary.Pillar.lastYearVal * 100).toFixed(1) + "%" : "—"
    },
    {
      "Category": "Other Brands",
      "Target": categorySummary.Others.targetVal,
      "Achievement": categorySummary.Others.achVal,
      "% Achievement": categorySummary.Others.targetVal > 0 ? (categorySummary.Others.achVal / categorySummary.Others.targetVal * 100).toFixed(1) + "%" : "—",
      "Growth YoY": categorySummary.Others.lastYearVal > 0 ? ((categorySummary.Others.achVal - categorySummary.Others.lastYearVal) / categorySummary.Others.lastYearVal * 100).toFixed(1) + "%" : "—"
    }
  ];

  // brand-wise rollup
  const brandMap = {};
  tgt.forEach(r => {
    const b = r.brand || 'Unknown';
    brandMap[b] = brandMap[b] || {brand:b, targetVal:0, targetUnit:0, achVal:0, achUnit:0, lastYearVal:0};
    brandMap[b].targetVal += (parseFloat(r.val_target_per_be)||0) * 100000 * targetMultiplier;
    brandMap[b].targetUnit += (parseFloat(r.unit_target_per_be)||0) * targetMultiplier;
  });
  filteredAch.forEach(r => {
    const b = r.brand || 'Unknown';
    brandMap[b] = brandMap[b] || {brand:b, targetVal:0, targetUnit:0, achVal:0, achUnit:0, lastYearVal:0};
    brandMap[b].achVal += parseFloat(r.amount)||0;
    brandMap[b].achUnit += parseFloat(r.quantity)||0;
  });
  filteredLastYear.forEach(r => {
    const b = r.brand || 'Unknown';
    if (brandMap[b]) brandMap[b].lastYearVal += parseFloat(r.amount)||0;
  });
  const brandRows = Object.values(brandMap).sort((a,b) => b.targetVal - a.targetVal);

  lastDashboardData.brands = brandRows.map(r => {
    const pct = r.targetVal > 0 ? (r.achVal/r.targetVal*100) : null;
    const g = r.lastYearVal > 0 ? ((r.achVal - r.lastYearVal)/r.lastYearVal*100) : null;
    return {
      "Brand": r.brand,
      "Target (Value)": r.targetVal,
      "Achievement (Value)": r.achVal,
      "% Achievement": pct !== null ? pct.toFixed(1) + "%" : "—",
      "Target (Units)": r.targetUnit,
      "Achievement (Units)": r.achUnit,
      "Growth YoY": g !== null ? g.toFixed(1) + "%" : "—"
    };
  });

  // team rollup (BE wise view for managers)
  let teamHtml = "";
  lastDashboardData.team = [];
  if (session.designation !== 'BE' && activeScopeIds.length > 1) {
    const { data: team } = await sb.from('employees').select('*').in('emp_id', activeScopeIds).eq('designation', 'BE');
    const teamMap = {};
    (team||[]).forEach(e => teamMap[e.emp_id] = {
      emp: e,
      pillar: { targetVal: 0, achVal: 0, lastYearVal: 0 },
      others: { targetVal: 0, achVal: 0, lastYearVal: 0 },
      total: { targetVal: 0, achVal: 0, lastYearVal: 0 }
    });

    const beBrandMap = {};

    tgt.forEach(r => {
      const entry = teamMap[r.emp_id];
      if (entry) {
        const cat = getBrandCategory(r.brand).toLowerCase();
        const val = (parseFloat(r.val_target_per_be)||0) * 100000 * targetMultiplier;
        entry[cat].targetVal += val;
        entry.total.targetVal += val;

        const key = `${r.emp_id}|${r.brand||'Unknown'}`;
        if (!beBrandMap[key]) {
           beBrandMap[key] = { emp_id: r.emp_id, emp_name: entry.emp.name || r.emp_id, hq: entry.emp.hq_name || '', region: entry.emp.region || '', brand: r.brand || 'Unknown', targetVal: 0, achVal: 0, lastYearVal: 0, targetUnit: 0, achUnit: 0 };
        }
        beBrandMap[key].targetVal += val;
        beBrandMap[key].targetUnit += (parseFloat(r.unit_target_per_be)||0) * targetMultiplier;
      }
    });

    filteredAch.forEach(r => {
      const entry = teamMap[r.be_emp_id];
      if (entry) {
        const cat = getBrandCategory(r.brand).toLowerCase();
        const val = parseFloat(r.amount)||0;
        entry[cat].achVal += val;
        entry.total.achVal += val;
        
        const key = `${r.be_emp_id}|${r.brand||'Unknown'}`;
        if (!beBrandMap[key]) {
           beBrandMap[key] = { emp_id: r.be_emp_id, emp_name: entry.emp.name || r.be_emp_id, hq: entry.emp.hq_name || '', region: entry.emp.region || '', brand: r.brand || 'Unknown', targetVal: 0, achVal: 0, lastYearVal: 0, targetUnit: 0, achUnit: 0 };
        }
        beBrandMap[key].achVal += val;
        beBrandMap[key].achUnit += parseFloat(r.quantity)||0;
      }
    });

    filteredLastYear.forEach(r => {

        const val = parseFloat(r.amount)||0;

      };
    });


    const teamRows = Object.values(teamMap).filter(t => t.total.targetVal > 0 || t.total.achVal > 0)
      .sort((a,b) => b.total.targetVal - a.total.targetVal);
    
    lastDashboardData.team = teamRows.map(t => {

        return acc;
      }, { targetVal: 0, achVal: 0, lastYearVal: 0, targetUnit: 0, achUnit: 0 });
      const detailRows = group.map(row => {
        const pct = row.targetVal > 0 ? (row.achVal / row.targetVal * 100) : null;
        const g = row.lastYearVal > 0 ? ((row.achVal - row.lastYearVal) / row.lastYearVal * 100) : null;
        return {
          "Row Type": "DETAIL",
