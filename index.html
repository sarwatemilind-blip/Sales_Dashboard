async function loadStockStatementData(){
  const body = document.getElementById("stockBody");
  if (!body) return;

  const scopeIds = getActiveScopeIdsForSelection();
  const scopeKey = selectedEmpId || 'overall';
  const targetYear = currentYear;
  const targetMonth = currentMonth;
  const scopeName = selectedEmpId === 'overall'
    ? `Overall Scope (${scopeLabel(session)})`
    : (allDownlineEmployees.find(e => e.emp_id === selectedEmpId) ? scopeLabel(allDownlineEmployees.find(e => e.emp_id === selectedEmpId)) : scopeLabel(session));
  const scopePill = document.getElementById("stockScopePill");
  if (scopePill) {
    scopePill.textContent = `${scopeIds.length} employee${scopeIds.length > 1 ? 's' : ''} in scope`;
  }

  body.innerHTML = `<p class="muted">Loading...</p>`;

  const visibleMappings = (await sb.from('stockist_mapping').select('*')).data || [];
  const visibleStockists = visibleMappings.filter(row => {
    const assignees = [
      row.be_emp_id_1, row.be_emp_id_2, row.be_emp_id_3,
      row.asm_emp_id, row.rsm_emp_id, row.zm_emp_id, row.vp_emp_id
    ].map(normalizeEmpId).filter(Boolean);
    return assignees.some(id => scopeIds.includes(id));
  });
  const visibleStockistMap = new Map();
  visibleStockists.forEach(row => {
    visibleStockistMap.set(normalizeEmpId(row.stockist_code), row);
  });
  const stockistSelector = document.getElementById("stockStockistSel");
  const visibleStockistList = [...visibleStockistMap.values()].sort((a, b) => (a.stockist_name || a.stockist_code || '').localeCompare(b.stockist_name || b.stockist_code || ''));
  const showStockistSelector = visibleStockistList.length > 1;
  if (stockistSelector) {
    const options = [];
    if (session.designation !== 'BE') {
      options.push(`<option value="all" ${selectedStockistCode === 'all' ? 'selected' : ''}>All stockists</option>`);
    }
    visibleStockistList.forEach(row => {
      const code = normalizeEmpId(row.stockist_code);
      const name = (row.stockist_name || row.stockist_code || '').toString().trim();
      options.push(`<option value="${code}">${name}${row.stockist_code ? ` (${row.stockist_code})` : ''}</option>`);
    });
    stockistSelector.innerHTML = options.join('');
    if (session.designation === 'BE') {
      if (selectedStockistCode === 'all' || !visibleStockistMap.has(normalizeEmpId(selectedStockistCode))) {
        selectedStockistCode = visibleStockistList[0] ? normalizeEmpId(visibleStockistList[0].stockist_code) : '';
      }
      stockistSelector.value = selectedStockistCode || (visibleStockistList[0] ? normalizeEmpId(visibleStockistList[0].stockist_code) : '');
      stockistSelector.style.display = showStockistSelector ? 'inline-block' : 'none';
      stockistSelector.disabled = !showStockistSelector;
    } else {
      if (selectedStockistCode !== 'all' && !visibleStockistMap.has(normalizeEmpId(selectedStockistCode))) {
        selectedStockistCode = 'all';
      }
      stockistSelector.value = selectedStockistCode;
      stockistSelector.style.display = visibleStockistList.length ? 'inline-block' : 'none';
      stockistSelector.disabled = !visibleStockistList.length;
    }
  }
  const { data: clubRows, error: clubErr } = await sb.from('product_clubbing').select('raw_product_code, canonical_brand, canonical_product_code');
  if (clubErr) {
    body.innerHTML = `<div class="err">Failed to load product catalog: ${clubErr.message}</div>`;
    return;
  }
  const productMap = new Map();
  (clubRows || []).forEach(r => {
    const productName = (r.canonical_brand || r.raw_product_code || '').toString().trim();
    const productCode = (r.canonical_product_code || r.raw_product_code || productName || '').toString().trim();
    const key = normalizeEmpId(productName || productCode);
    if (!key || productMap.has(key)) return;
    productMap.set(key, {
      product_code: productCode,
      product_name: productName,
      brand: productName
    });
  });
  const productCatalog = [...productMap.values()].sort((a, b) => a.product_name.localeCompare(b.product_name));
  async function fetchAllSalesForMonth(year, month) {
    let allSales = [];
    let from = 0;
    while (true) {
      const { data, error } = await sb.from('sales')
        .select('id, period_year, period_month, stockist_code, stockist_name, hq_code, hq_name, raw_product_code, raw_product_name, brand, canonical_product_code, quantity, amount')
        .eq('period_year', year)
        .eq('period_month', month)
        .order('id', { ascending: true })
        .range(from, from + 999);
      if (error) {
        throw error;
      }
      allSales = allSales.concat(data || []);
      if (!data || data.length < 1000) break;
      from += 1000;
    }
    return allSales;
  }

  async function fetchAllSalesHistory() {
    let allSales = [];
    let from = 0;
    while (true) {
      const { data, error } = await sb.from('sales')
        .select('canonical_product_code, raw_product_code, raw_product_name, brand, quantity, amount')
        .order('id', { ascending: true })
        .range(from, from + 999);
      if (error) {
        throw error;
      }
      allSales = allSales.concat(data || []);
      if (!data || data.length < 1000) break;
      from += 1000;
    }
    return allSales;
  }

  let currentSales = [];
  try {
    currentSales = (await fetchAllSalesForMonth(targetYear, targetMonth)).filter(r => visibleStockistMap.has(normalizeEmpId(r.stockist_code)));
  } catch (error) {
    body.innerHTML = `<div class="err">Failed to load sales: ${error.message}</div>`;
    return;
  }
  let allSalesHistory = [];
  try {
    allSalesHistory = await fetchAllSalesHistory();
  } catch (error) {
    console.warn("Failed to load historical sales for product rate fallback:", error);
  }
  const prevPeriod = prevFiscalPeriod(targetYear, targetMonth);
  const [currentSavedResp, prevSavedResp, prevSavedAnyResp] = await Promise.all([
    sb.from('stock_statement_items')
      .select('*')
      .eq('scope_emp_id', scopeKey)
      .eq('period_year', targetYear)
      .eq('period_month', targetMonth),
    sb.from('stock_statement_items')
      .select('*')
      .eq('scope_emp_id', scopeKey)
      .eq('period_year', prevPeriod.year)
      .eq('period_month', prevPeriod.month),
    sb.from('stock_statement_items')
      .select('*')
      .eq('period_year', prevPeriod.year)
      .eq('period_month', prevPeriod.month)
  ]);
  if (currentSavedResp.error) {
    body.innerHTML = `<div class="err">Failed to load saved statement rows: ${currentSavedResp.error.message}</div>`;
    return;
  }
  if (prevSavedResp.error) {
    body.innerHTML = `<div class="err">Failed to load previous month statement rows: ${prevSavedResp.error.message}</div>`;
    return;
  }

  const currentSavedRows = currentSavedResp.data || [];
  const prevSavedRows = prevSavedResp.data || [];
  const prevSavedAnyRows = prevSavedAnyResp.data || [];
  const currentSavedMap = new Map(currentSavedRows.map(r => [`${normalizeEmpId(r.stockist_code)}|${normalizeEmpId(r.product_code)}`, r]));
  const prevSavedMap = new Map(prevSavedRows.map(r => [`${normalizeEmpId(r.stockist_code)}|${normalizeEmpId(r.product_code)}`, r]));
  const prevSavedAnyMap = new Map(prevSavedAnyRows.map(r => [`${normalizeEmpId(r.stockist_code)}|${normalizeEmpId(r.product_code)}`, r]));

  const salesMap = new Map();
  const currentProductRateMap = new Map();
  const historicalProductRateMap = new Map();
  allSalesHistory.forEach(r => {
    const productKey = normalizeEmpId(r.canonical_product_code || r.raw_product_code || r.raw_product_name || r.brand);
    if (!productKey) return;
    const stats = historicalProductRateMap.get(productKey) || { units: 0, value: 0, rate: 0 };
    stats.units += parseFloat(r.quantity) || 0;
    stats.value += parseFloat(r.amount) || 0;
    stats.rate = stats.units > 0 ? (stats.value / stats.units) : stats.rate;
    historicalProductRateMap.set(productKey, stats);
  });
  currentSales.forEach(r => {
    const stockistCode = normalizeEmpId(r.stockist_code);
    const productCode = normalizeEmpId(r.canonical_product_code || r.raw_product_code || r.raw_product_name || r.brand);
    const key = `${stockistCode}|${productCode}`;
    const productKey = normalizeEmpId(r.canonical_product_code || r.raw_product_code || r.raw_product_name || r.brand);
    const mappingRow = visibleStockistMap.get(stockistCode) || {};
    const productName = (r.raw_product_name || r.brand || r.canonical_product_code || r.raw_product_code || productCode || '').toString().trim();
    if (!salesMap.has(key)) {
      salesMap.set(key, {
        stockist_code: stockistCode,
        stockist_name: (mappingRow.stockist_name || r.stockist_name || stockistCode || '').toString().trim(),
        product_code: productCode,
        product_name: productName,
        brand: (r.brand || productName || '').toString().trim(),
        primary_units: 0,
        primary_value: 0,
        sale_rate: 0
      });
    }
    const item = salesMap.get(key);
    item.primary_units += parseFloat(r.quantity) || 0;
    item.primary_value += parseFloat(r.amount) || 0;
    item.product_name = productName || item.product_name;
    item.brand = (r.brand || item.brand || productName || '').toString().trim();
    item.sale_rate = item.primary_units > 0 ? (item.primary_value / item.primary_units) : item.sale_rate;

    if (productKey) {
      const stats = currentProductRateMap.get(productKey) || { units: 0, value: 0, rate: 0 };
      stats.units += parseFloat(r.quantity) || 0;
      stats.value += parseFloat(r.amount) || 0;
      stats.rate = stats.units > 0 ? (stats.value / stats.units) : stats.rate;
      currentProductRateMap.set(productKey, stats);
    }
  });

  let stockistCatalog = visibleStockistList;
  if (selectedStockistCode !== 'all') {
    stockistCatalog = stockistCatalog.filter(row => normalizeEmpId(row.stockist_code) === normalizeEmpId(selectedStockistCode));
  }
  const isInitialMonth = targetYear === 2026 && targetMonth === 3;
  const groups = stockistCatalog.map(stockistRow => {
    const stockistCode = normalizeEmpId(stockistRow.stockist_code);
    const stockistName = (stockistRow.stockist_name || stockistRow.stockist_code || '').toString().trim();
    const rows = productCatalog.map(product => {
      const key = `${stockistCode}|${normalizeEmpId(product.product_code)}`;
      const sales = salesMap.get(key) || null;
      const saved = currentSavedMap.get(key) || null;
      const prevSaved = prevSavedMap.get(key) || null;
      const prevAnySaved = prevSavedAnyMap.get(key) || null;
      const openingCandidates = [
        saved && saved.opening_units != null ? (parseFloat(saved.opening_units) || 0) : null,
        prevSaved && prevSaved.closing_units != null ? (parseFloat(prevSaved.closing_units) || 0) : null,
        prevAnySaved && prevAnySaved.closing_units != null ? (parseFloat(prevAnySaved.closing_units) || 0) : null
      ].filter(v => v != null);
      const openingUnits = isInitialMonth
        ? 0
        : (openingCandidates.find(v => v > 0) ?? openingCandidates[0] ?? 0);
      const primaryUnits = sales ? sales.primary_units : 0;
      const primaryValue = sales ? sales.primary_value : 0;
      const productKey = normalizeEmpId(product.product_code);
      const currentRate = currentProductRateMap.get(productKey) || null;
      const historicalRate = historicalProductRateMap.get(productKey) || null;
      const savedRate = saved && saved.sale_rate != null ? parseFloat(saved.sale_rate) || 0 : 0;
      const prevSavedRate = prevSaved && prevSaved.sale_rate != null ? parseFloat(prevSaved.sale_rate) || 0 : 0;
      const marketRate = primaryUnits > 0
        ? (primaryValue / primaryUnits)
        : (currentRate?.rate || historicalRate?.rate || 0);
      const saleRate = savedRate || prevSavedRate || marketRate;
      const totalUnits = openingUnits + primaryUnits;
      const secondaryUnits = saved && saved.secondary_units != null ? parseFloat(saved.secondary_units) || 0 : 0;
      const openingValue = saved && saved.opening_value != null
        ? (parseFloat(saved.opening_value) || 0)
        : (prevSaved && prevSaved.closing_value != null
          ? (parseFloat(prevSaved.closing_value) || 0)
          : 0);
      const secondaryValue = secondaryUnits * saleRate;
      const closingUnits = totalUnits - secondaryUnits;
      const closingValue = closingUnits * saleRate;
      const openingEditable = isInitialMonth;
      const openingDisplay = isInitialMonth
        ? ''
        : (openingEditable
          ? (saved || prevSaved || prevAnySaved ? openingUnits : '')
          : openingUnits);
      return {
        stockist_code: stockistCode,
        stockist_name: (sales?.stockist_name || saved?.stockist_name || stockistName || '').toString().trim(),
        product_code: product.product_code,
        product_name: product.product_name,
        brand: product.brand,
        openingUnits,
        openingValue,
        primaryUnits,
        primaryValue,
        saleRate,
        totalUnits,
        secondaryUnits,
        secondaryValue,
        closingUnits,
        closingValue,
        openingEditable,
        openingDisplay,
        saved: !!saved,
        key
      };
    }).sort((a, b) => a.product_name.localeCompare(b.product_name));
    return { stockist_code: stockistCode, stockist_name: stockistName, rows };
  });

  const rows = groups.flatMap(g => g.rows);

  const grandTotals = rows.reduce((acc, row) => {
    acc.openingUnits += row.openingUnits || 0;
    acc.openingValue += row.openingValue || 0;
    acc.primaryUnits += row.primaryUnits || 0;
    acc.primaryValue += row.primaryValue || 0;
    acc.secondaryUnits += row.secondaryUnits || 0;
    acc.secondaryValue += row.secondaryValue || 0;
    acc.closingUnits += row.closingUnits || 0;
    acc.closingValue += row.closingValue || 0;
    return acc;
  }, { openingUnits: 0, openingValue: 0, primaryUnits: 0, primaryValue: 0, secondaryUnits: 0, secondaryValue: 0, closingUnits: 0, closingValue: 0 });

  const grandSaleRate = grandTotals.primaryUnits > 0 ? grandTotals.primaryValue / grandTotals.primaryUnits : 0;
  lastStockStatementData = {
    rows,
    groups,
    scopeEmpId: scopeKey,
    year: targetYear,
    month: targetMonth,
    grandTotals: { ...grandTotals, saleRate: grandSaleRate, stockist_count: groups.length },
    context: { scopeKey, targetYear, targetMonth }
  };

  if (rows.length === 0) {
    body.innerHTML = `<p class="muted">No visible stockists or sales rows found for this month.</p>`;
    return;
  }

  const headerMonth = `${monthLabel(targetMonth)} ${targetYear + (targetMonth >= 10 ? 1 : 0)}`;
  body.innerHTML = `
    <div class="small" style="margin-bottom:12px;">Scope: <b>${scopeName}</b> | Month: <b>${headerMonth}</b></div>
    <div class="kpi-row" style="margin-bottom:16px;">
      <div class="kpi"><div class="label">Opening Value</div><div class="value">${fmtCurrency(grandTotals.openingValue)}</div><div class="sub">${fmtNum(grandTotals.openingUnits)} units</div></div>
      <div class="kpi"><div class="label">Primary Sales Value</div><div class="value">${fmtCurrency(grandTotals.primaryValue)}</div><div class="sub">${fmtNum(grandTotals.primaryUnits)} units</div></div>
      <div class="kpi"><div class="label">Secondary Value</div><div class="value">${fmtCurrency(grandTotals.secondaryValue)}</div><div class="sub">${fmtNum(grandTotals.secondaryUnits)} units</div></div>
      <div class="kpi"><div class="label">Closing Value</div><div class="value">${fmtCurrency(grandTotals.closingValue)}</div><div class="sub">${fmtNum(grandTotals.closingUnits)} units</div></div>
    </div>
    <div style="overflow-x:auto;">
      <table class="stock-table" style="min-width:1450px; width:100%;">
        <thead>
          <tr>
            <th>Stockist</th>
            <th>Product</th>
            <th class="num">Opening<br>(Units)</th>
            <th class="num">Primary Sales<br>(Units)</th>
            <th class="num">Primary Sales<br>(Value)</th>
            <th class="num">Sale Rate</th>
            <th class="num">Total<br>(Units)</th>
            <th class="num">Secondary Sales<br>(Units)</th>
            <th class="num">Secondary Sales<br>(Value)</th>
            <th class="num">Closing<br>(Units)</th>
            <th class="num">Closing<br>(Value)</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${groups.map(group => {
            const groupTotals = group.rows.reduce((acc, row) => {
              acc.openingUnits += row.openingUnits || 0;
              acc.primaryUnits += row.primaryUnits || 0;
              acc.primaryValue += row.primaryValue || 0;
              acc.secondaryUnits += row.secondaryUnits || 0;
              acc.secondaryValue += row.secondaryValue || 0;
              acc.closingUnits += row.closingUnits || 0;
              acc.closingValue += row.closingValue || 0;
              return acc;
            }, { openingUnits: 0, primaryUnits: 0, primaryValue: 0, secondaryUnits: 0, secondaryValue: 0, closingUnits: 0, closingValue: 0 });
            return `${group.rows.map(row => {
              const rowKey = statementDomKey(row.stockist_code, row.product_code);
              return `<tr>
                <td>
                  <div class="row-head">${row.stockist_name}</div>
                  <div class="row-sub">${row.stockist_code}</div>
                </td>
                <td>
                  <div class="row-head">${row.product_name}</div>
                  <div class="row-sub">${row.brand || row.product_code}</div>
                </td>
                <td class="num">
                  <input id="stockOpening_${rowKey}" class="stock-input" type="number" step="0.01" min="0" autocomplete="off" value="${row.openingDisplay}" ${row.openingEditable ? '' : 'disabled'} />
                </td>
                <td class="num">${fmtNum(row.primaryUnits)}</td>
                <td class="num">${fmtCurrency(row.primaryValue)}</td>
                <td class="num">${row.saleRate ? fmtCurrency(row.saleRate) : '₹0'}</td>
                <td class="num">${fmtNum(row.totalUnits)}</td>
                <td class="num">
                  <input id="stockSecondary_${rowKey}" class="stock-input" type="number" step="0.01" min="0" value="${row.saved ? row.secondaryUnits : ''}" placeholder="Enter units" />
                </td>
                <td class="num">${fmtCurrency(row.secondaryValue)}</td>
                <td class="num">${fmtNum(row.closingUnits)}</td>
                <td class="num">${fmtCurrency(row.closingValue)}</td>
                <td style="white-space:nowrap;">
                  <button class="btn-primary" id="stockSave_${rowKey}" type="button" style="width:auto; padding:8px 12px; margin-right:6px;">Save</button>
                  <button class="btn-ghost" id="stockDelete_${rowKey}" type="button" style="width:auto; padding:8px 12px; color:var(--bad); border-color:var(--bad);">Clear</button>
                </td>
              </tr>`;
            }).join('')}
            <tr class="stock-total-row">
              <td><span class="total-chip">Subtotal</span> ${group.stockist_name}</td>
              <td>All products</td>
              <td class="num">${fmtNum(groupTotals.openingUnits)}</td>
              <td class="num">${fmtNum(groupTotals.primaryUnits)}</td>
              <td class="num">${fmtCurrency(groupTotals.primaryValue)}</td>
              <td class="num"></td>
              <td class="num"></td>
              <td class="num">${fmtNum(groupTotals.secondaryUnits)}</td>
              <td class="num">${fmtCurrency(groupTotals.secondaryValue)}</td>
              <td class="num">${fmtNum(groupTotals.closingUnits)}</td>
              <td class="num">${fmtCurrency(groupTotals.closingValue)}</td>
              <td></td>
            </tr>`;
          }).join('')}
          <tr class="stock-total-row">
            <td><span class="total-chip">Grand Total</span></td>
            <td>All stockists / all products</td>
            <td class="num">${fmtNum(grandTotals.openingUnits)}</td>
            <td class="num">${fmtNum(grandTotals.primaryUnits)}</td>
            <td class="num">${fmtCurrency(grandTotals.primaryValue)}</td>
            <td class="num"></td>
            <td class="num"></td>
            <td class="num">${fmtNum(grandTotals.secondaryUnits)}</td>
            <td class="num">${fmtCurrency(grandTotals.secondaryValue)}</td>
            <td class="num">${fmtNum(grandTotals.closingUnits)}</td>
            <td class="num">${fmtCurrency(grandTotals.closingValue)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="stock-note">Opening is editable only for the first statement month. Every later month carries the previous closing forward automatically. Use Save to update a row or Clear to reset the entered values before final submission. Totals are shown in rupees in the value columns.</div>
  `;

  groups.forEach(group => {
    group.rows.forEach(row => {
      const rowKey = statementDomKey(row.stockist_code, row.product_code);
      if (isInitialMonth) {
        const openingInput = document.getElementById(`stockOpening_${rowKey}`);
        if (openingInput) {
          openingInput.value = '';
          openingInput.defaultValue = '';
          openingInput.removeAttribute('value');
        }
      }
      const btn = document.getElementById(`stockSave_${rowKey}`);
      const delBtn = document.getElementById(`stockDelete_${rowKey}`);
      if (btn) {
        btn.onclick = async () => {
          if (await saveAllStockStatementEntries()) {
            await loadStockStatementData();
          }
        };
      }
      if (delBtn) {
        delBtn.onclick = async () => {
          if (!confirm(`Clear the entered values for ${row.stockist_name} - ${row.product_name}?`)) return;
          const openingInput = document.getElementById(`stockOpening_${rowKey}`);
          const secondaryInput = document.getElementById(`stockSecondary_${rowKey}`);
          if (openingInput && row.openingEditable) openingInput.value = '0';
          if (secondaryInput) secondaryInput.value = '0';
          if (await saveAllStockStatementEntries()) {
            await loadStockStatementData();
          }
        };
      }
    });
  });
}

function downloadStockStatementExcel(){
  try {
    const wb = XLSX.utils.book_new();
    const rows = (lastStockStatementData.rows || []).map(row => ({
      "Stockist Code": row.stockist_code,
      "Stockist Name": row.stockist_name,
      "Product Code": row.product_code,
      "Product Name": row.product_name,
      "Brand": row.brand,
      "Opening Units": row.openingUnits,
      "Opening Value": row.openingValue || 0,
      "Primary Units": row.primaryUnits,
      "Primary Value": row.primaryValue,
      "Sale Rate": row.saleRate,
      "Total Units": row.totalUnits,
      "Secondary Units": row.secondaryUnits,
      "Secondary Value": row.secondaryValue,
      "Closing Units": row.closingUnits,
      "Closing Value": row.closingValue
    }));
    const ws1 = XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws1, "Statement");
    if (lastStockStatementData.grandTotals) {
      const ws2 = XLSX.utils.json_to_sheet([{
        "Scope": lastStockStatementData.scopeEmpId,
        "Month": `${monthLabel(lastStockStatementData.month)} ${lastStockStatementData.year + (lastStockStatementData.month >= 10 ? 1 : 0)}`,
        "Opening Value": lastStockStatementData.grandTotals.openingValue || 0,
        "Primary Value": lastStockStatementData.grandTotals.primaryValue,
        "Secondary Value": lastStockStatementData.grandTotals.secondaryValue,
        "Closing Value": lastStockStatementData.grandTotals.closingValue
      }]);
      XLSX.utils.book_append_sheet(wb, ws2, "Totals");
    }
    XLSX.writeFile(wb, `Stock_Statement_${lastStockStatementData.year}_${String(lastStockStatementData.month).padStart(2,'0')}.xlsx`);
  } catch (err) {
    alert("Export failed: " + err.message);
  }
}

function downloadDashboardDataExcel() {
  try {
    const wb = XLSX.utils.book_new();
    
    const ws1 = XLSX.utils.json_to_sheet(lastDashboardData.kpis);
    XLSX.utils.book_append_sheet(wb, ws1, "KPI Summary");

    if (lastDashboardData.categories && lastDashboardData.categories.length > 0) {
      const wsCat = XLSX.utils.json_to_sheet(lastDashboardData.categories);
      XLSX.utils.book_append_sheet(wb, wsCat, "Category Performance");
    }
    
    const ws2 = XLSX.utils.json_to_sheet(lastDashboardData.brands);
    XLSX.utils.book_append_sheet(wb, ws2, "Brand Performance");
    
    if (lastDashboardData.team && lastDashboardData.team.length > 0) {
      const ws3 = XLSX.utils.json_to_sheet(lastDashboardData.team);
      XLSX.utils.book_append_sheet(wb, ws3, "BE Performance");
    }
    
    if (lastDashboardData.beBrandDetail && lastDashboardData.beBrandDetail.length > 0) {
      const ws4 = XLSX.utils.json_to_sheet(lastDashboardData.beBrandDetail);
      XLSX.utils.book_append_sheet(wb, ws4, "BE x Brand Detail");
    }

    if (lastDashboardData.beBrandTotals && lastDashboardData.beBrandTotals.length > 0) {
      const ws5 = XLSX.utils.json_to_sheet(lastDashboardData.beBrandTotals);
      XLSX.utils.book_append_sheet(wb, ws5, "BE Totals");
    }
    
    let label = "";
    if (currentView === 'bimonthly') {
      const startMonth = currentMonth % 2 === 1 ? currentMonth : currentMonth - 1;
      label = `BiMonthly_${monthLabel(startMonth)}_${monthLabel(startMonth + 1)}`;
    } else if (currentView === 'ytd') {
      label = `YTD_Apr_to_${monthLabel(currentMonth)}`;
    } else if (currentView === 'mtd') {
      label = `MTD_${monthLabel(currentMonth)}`;
    } else {
      label = `Monthly_${monthLabel(currentMonth)}`;
    }
    
    XLSX.writeFile(wb, `Sales_Dashboard_${label}_${currentYear}.xlsx`);
  } catch (err) {
    alert("Export failed: " + err.message);
  }
}

    <div class="upload-box">
      <div class="section-title" style="margin-top:0;">Upload daily / monthly sales report</div>
      <p class="small">Upload the standard sales export (same column layout as APR26_SALE / May26_Sales_Interact reports). Product codes are clubbed automatically using the product_clubbing table.</p>

function parseBillDate(val) {
  if (!val) return null;
  if (val instanceof Date && !isNaN(val.getTime())) {
    // SheetJS cellDates parses dates as UTC. Use UTC methods to avoid timezone shift.
    return new Date(val.getUTCFullYear(), val.getUTCMonth(), val.getUTCDate(), 12, 0, 0);
  }
  const str = val.toString().trim();
  if (/^\d+(\.\d+)?$/.test(str)) {
    const num = parseFloat(str);
    const d = new Date((num - 25569) * 86400 * 1000);
    if (!isNaN(d.getTime())) {
      return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 12, 0, 0);
    }
  }
  let parts = str.split(/[-/.]/);
  if (parts.length === 3) {
    if (parts[0].length === 4) {
      const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), 12, 0, 0);
      if (!isNaN(d.getTime())) return d;
    } else {
      const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]), 12, 0, 0);
      if (!isNaN(d.getTime())) return d;
    }
  }
  const d = new Date(str);
  if (!isNaN(d.getTime())) {
    return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
  }
  return null;
}

async function handleUpload(e){
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById("upStatus");
  const progBar = document.getElementById("progBar");
  const period_month = parseInt(document.getElementById("upMonth").value);
  const period_year = parseInt(document.getElementById("upYear").value);

  status.textContent = "Reading file…";
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const ws = wb.Sheets["Report"] || wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  // locate header row dynamically (column containing "Distributor Code" or similar)
  let headerIdx = rows.findIndex(r => r && r.some(c => c && ["DISTRIBUTOR CODE", "STOCKIST CODE", "PERIOD_YEAR"].includes(c.toString().trim().toUpperCase())));
  if (headerIdx === -1) { status.textContent = "Could not find header row — check file format."; return; }

  const headersRow = rows[headerIdx];
  const findColIdx = (names) => {
    // exact match first
    let idx = headersRow.findIndex(h => {
      if (h === null || h === undefined) return false;
      const val = h.toString().trim().toUpperCase();
      return names.some(n => val === n.toUpperCase());
    });
    if (idx !== -1) return idx;
    // partial match fallback
    return headersRow.findIndex(h => {
      if (h === null || h === undefined) return false;
      const val = h.toString().trim().toUpperCase();
      return names.some(n => val.includes(n.toUpperCase()));
    });
  };

  const colDistributorCode = findColIdx(["Distributor Code", "Distributor", "period_year"]); 
  const colStockistCode = findColIdx(["Stockist Code", "Stockist_Code", "Stk Code"]);
  const colStockistName = findColIdx(["Stockist Name", "Stockist_Name", "Stk Name"]);
  const colBillDate = findColIdx(["Bill Date", "Invoice Date", "bill_date", "Date"]);
  const colHqCode = findColIdx(["HQ Code", "hq_code", "Hq Code"]);
  const colHqName = findColIdx(["HQ Name", "hq_name", "Hq Name"]);
  const colMrEmpId = findColIdx(["MR Code", "mr_emp_id", "MR Emp ID", "Emp Code"]);
  const colMrName = findColIdx(["MR Name", "mr_name", "Emp Name"]);
  const colRawProductCode = findColIdx(["Product Code", "raw_product_code", "Item Code"]);
  const colRawProductName = findColIdx(["Product Name", "raw_product_name", "Item Name"]);
  const colQuantity = findColIdx(["Quantity", "quantity", "Qty"]);
  const colAmount = findColIdx(["Amount", "amount", "Value", "Net Amount"]);

  if (colStockistCode === -1 || colAmount === -1) {
    status.textContent = "Could not find essential columns (Stockist Code & Amount) in header row.";
    return;
  }

  status.textContent = "Loading product clubbing table…";
  const { data: clubbing } = await sb.from('product_clubbing').select('*');
  const clubMap = {};
  (clubbing||[]).forEach(c => clubMap[c.raw_product_code] = c);

  const dataRows = rows.slice(headerIdx + 1).filter(r => r && (r[colDistributorCode !== -1 ? colDistributorCode : 0] || r[colStockistCode]));
  status.textContent = `Parsing ${dataRows.length} rows…`;

  const out = [];
  const periodsToClear = new Set();
  for (const r of dataRows) {
    const quantity = colQuantity !== -1 ? r[colQuantity] : 0;
    const amount = colAmount !== -1 ? r[colAmount] : 0;
    if (quantity == null && amount == null) continue;
    
    const rawCode = colRawProductCode !== -1 ? (r[colRawProductCode]||"").toString().trim() : "";
    const club = clubMap[rawCode];
    const rawDateVal = colBillDate !== -1 ? r[colBillDate] : null;
    const parsedDate = parseBillDate(rawDateVal);
    
    let r_month = period_month;
    let r_year = period_year;
    
    if (parsedDate) {
      r_month = getFiscalMonthNum(parsedDate);
      r_year = getFiscalYearStart(parsedDate);
    }
    
    periodsToClear.add(`${r_year}-${r_month}`);
    
    out.push({
      period_year: r_year,
      period_month: r_month,
      bill_date: parsedDate ? `${parsedDate.getFullYear()}-${String(parsedDate.getMonth()+1).padStart(2,'0')}-${String(parsedDate.getDate()).padStart(2,'0')}` : null,
      distributor_code: colDistributorCode !== -1 ? (r[colDistributorCode] || '').toString().trim() : null,
      stockist_code: colStockistCode !== -1 ? (r[colStockistCode]||"").toString().trim() : null,
      stockist_name: colStockistName !== -1 ? r[colStockistName] : null,
      hq_code: colHqCode !== -1 ? (r[colHqCode]||"").toString().trim() : null,
      hq_name: colHqName !== -1 ? r[colHqName] : null,
      mr_emp_id: colMrEmpId !== -1 ? r[colMrEmpId] : null,
      mr_name: colMrName !== -1 ? r[colMrName] : null,
      raw_product_code: rawCode,
      raw_product_name: colRawProductName !== -1 ? r[colRawProductName] : null,
      brand: club ? club.canonical_brand : (colRawProductName !== -1 ? r[colRawProductName] : null),
      canonical_product_code: club ? club.canonical_product_code : rawCode,
      quantity: parseFloat(quantity)||0,
      amount: parseFloat(amount)||0,
      uploaded_by: session.emp_id,
    });
  }

  status.textContent = "Clearing existing sales data for periods in the uploaded file…";
  for (const p of periodsToClear) {
    const [y, m] = p.split("-").map(Number);
    const { error: clearError } = await sb.from('sales')
      .delete()
      .eq('period_year', y)
      .eq('period_month', m);
    if (clearError) {
      console.warn(`Could not clear sales data for period ${y}-${m}:`, clearError.message);
    }
  }

  status.textContent = `Uploading ${out.length} rows to Supabase…`;
  const batchSize = 500;
  for (let i = 0; i < out.length; i += batchSize) {
    const batch = out.slice(i, i + batchSize);
    const { error } = await sb.from('sales').insert(batch);
    if (error) { status.textContent = "Error: " + error.message; return; }
    progBar.style.width = Math.round(((i+batch.length)/out.length)*100) + "%";
  }
  status.innerHTML = `<span style="color:var(--good);font-weight:600;">Done.</span> Uploaded ${out.length} sales rows.`;
  loadUploadedFiles();
}

async function loadUploadedFiles() {
  const tbody = document.getElementById("uploadsList");
  if (!tbody) return;

  // Try RPC first
  let { data, error } = await sb.rpc('get_uploaded_files');
  
  if (error) {
    console.warn("RPC get_uploaded_files failed, falling back to client-side grouping...", error);
    // Fallback: Fetch all uploaded_at, period_year, period_month, amount, uploaded_by from sales
    const { data: rawSales, error: rawError } = await sb.from('sales')
      .select('uploaded_at, period_year, period_month, amount, uploaded_by')
      .order('id', { ascending: false })
      .limit(1000);
    if (rawError) {
      tbody.innerHTML = `<tr><td colspan="6" class="err">Error loading uploads: ${rawError.message}</td></tr>`;
      return;
    }
    
    // Group in JS
    const groups = {};
    (rawSales || []).forEach(r => {
      if (!r.uploaded_at) return;
      const key = r.uploaded_at.substring(0, 16); // YYYY-MM-DD HH:MM
      if (!groups[key]) {
        groups[key] = {
          upload_group_id: key,
          period_year: r.period_year,
          period_month: r.period_month,
          row_count: 0,
          total_amount: 0.0,
          uploaded_at: r.uploaded_at,
          uploaded_by: r.uploaded_by
        };
      }
      groups[key].row_count++;
      groups[key].total_amount += parseFloat(r.amount) || 0;
    });
    data = Object.values(groups).sort((a, b) => b.uploaded_at.localeCompare(a.uploaded_at));
  }

  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="muted" style="text-align:center;padding:12px;">No uploads found.</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(u => {
    const formattedDate = new Date(u.uploaded_at).toLocaleString();
    const calYear = u.period_month >= 10 ? u.period_year + 1 : u.period_year;
    const periodStr = `${monthLabel(u.period_month)} ${calYear}`;
    const amtStr = (u.total_amount || 0).toLocaleString('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });
    return `
      <tr>
        <td>${formattedDate}</td>
        <td><b>${periodStr}</b></td>
        <td class="num">${u.row_count}</td>
        <td class="num" style="font-weight:600;">${amtStr}</td>
        <td>${u.uploaded_by || '—'}</td>
        <td style="text-align:center;">
          <button class="btn-ghost" style="color:var(--bad); border-color:var(--bad); padding:4px 8px; font-size:12px;" onclick="deleteUploadGroup('${u.upload_group_id}')">Delete</button>
        </td>
      </tr>
    `;
  }).join("");
}

async function deleteUploadGroup(groupId) {
  if (!confirm(`Are you sure you want to delete all sales records from this upload (${groupId})?`)) return;
  
  // Try RPC first
  const { error } = await sb.rpc('delete_upload_group', { p_upload_group_id: groupId });
  
  if (error) {
    console.warn("RPC delete_upload_group failed, falling back to direct delete...", error);
    // Direct delete fallback
    const { error: delError } = await sb.from('sales')
      .delete()
      .gte('uploaded_at', `${groupId}:00`)
      .lte('uploaded_at', `${groupId}:59`);
      
    if (delError) {
      alert("Failed to delete upload group: " + delError.message);
      return;
    }
  }
  
  alert("Successfully deleted upload group.");
  loadUploadedFiles();
}

window.deleteUploadGroup = deleteUploadGroup;

async function handleEmployeeUpload(e){
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById("empUpStatus");
  const progBar = document.getElementById("empProgBar");

  status.textContent = "Reading file…";
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws);

  if (rows.length === 0) {
    status.textContent = "The file is empty.";
    return;
  }

  // Normalize column names: lowercase + trim, and fix known typos
  const normalizeKey = k => k.toString().toLowerCase().trim().replace(/\s+/g,'_');
  const keyMap = {}; // normalized -> original
  Object.keys(rows[0]).forEach(k => { keyMap[normalizeKey(k)] = k; });
  // Known aliases for column name typos
  const aliases = { 'regioin': 'region' };
  Object.keys(aliases).forEach(bad => {
    if (keyMap[bad] && !keyMap[aliases[bad]]) keyMap[aliases[bad]] = keyMap[bad];
  });
  const get = (row, col) => {
    const orig = keyMap[col];
    return orig !== undefined ? (row[orig] || '') : '';
  };

  // Validate required columns (using normalized names)
  const required = ['emp_id', 'name', 'designation', 'hq_code', 'hq_name', 'manager_emp_id', 'state', 'region'];
  const missing = required.filter(col => !keyMap[col]);
  if (missing.length > 0) {
    status.textContent = `Error: Missing columns: ${missing.join(", ")}`;
    return;
  }

  status.textContent = `Clearing old employee records (except ADMIN)…`;
  // Delete all non-admin employees first (keeps hierarchy updates clean)
  const { error: delError } = await sb.from('employees').delete().neq('emp_id', 'ADLA02');
  if (delError) {
    status.textContent = "Failed to clear existing employees: " + delError.message;
    return;
  }

  // Build full employee list (excluding ADLA02 to avoid duplicate PK)
  const allEmps = rows.map(r => ({
    emp_id:         get(r,'emp_id').toString().trim(),
    name:           get(r,'name').toString().trim(),
    designation:    get(r,'designation').toString().trim(),
    hq_code:        get(r,'hq_code').toString().trim(),
    hq_name:        get(r,'hq_name').toString().trim(),
    manager_emp_id: get(r,'manager_emp_id').toString().trim() || null,
    state:          get(r,'state').toString().trim(),
    region:         get(r,'region').toString().trim(),
    is_admin:       get(r,'designation').toString().trim().toUpperCase() === 'ADMIN'
  })).filter(x => x.emp_id && x.emp_id !== 'ADLA02');

  // PASS 1: Insert all employees with manager_emp_id = null to avoid FK violations
  status.textContent = `Pass 1/2: Inserting ${allEmps.length} employees (no manager links yet)…`;
  const batchSize = 100;
  for (let i = 0; i < allEmps.length; i += batchSize) {
    const batch = allEmps.slice(i, i + batchSize).map(r => ({ ...r, manager_emp_id: null }));
    const { error: insError } = await sb.from('employees').insert(batch);
    if (insError) {
      status.textContent = `Pass 1 failed at row ${i}: ` + insError.message;
      console.error('Pass 1 insert error:', insError);
      return;
    }
    progBar.style.width = Math.round(((i + batch.length) / allEmps.length) * 40) + '%';
  }

  // PASS 2: Update each employee's manager_emp_id
  status.textContent = `Pass 2/2: Setting manager relationships…`;
  const withManager = allEmps.filter(r => r.manager_emp_id);
  for (let i = 0; i < withManager.length; i += batchSize) {
    const batch = withManager.slice(i, i + batchSize);
    for (const emp of batch) {
      const { error: updErr } = await sb.from('employees')
        .update({ manager_emp_id: emp.manager_emp_id })
        .eq('emp_id', emp.emp_id);
      if (updErr) {
        status.textContent = `Pass 2 failed for ${emp.emp_id}: ` + updErr.message;
        console.error('Pass 2 update error:', updErr);
        return;
      }
    }
    progBar.style.width = (40 + Math.round(((i + batch.length) / withManager.length) * 35)) + '%';
  }

  const adla02Row = rows.find(r => get(r, 'emp_id').toString().trim() === 'ADLA02');
  if (adla02Row) {
    const { error: syncError } = await sb.from('employees')
      .update({
        name: get(adla02Row, 'name').toString().trim(),
        designation: get(adla02Row, 'designation').toString().trim(),
        hq_code: get(adla02Row, 'hq_code').toString().trim(),
        hq_name: 'Mumbai',
        manager_emp_id: get(adla02Row, 'manager_emp_id').toString().trim() || null,
        state: get(adla02Row, 'state').toString().trim(),
        region: get(adla02Row, 'region').toString().trim(),
        is_admin: false
      })
      .eq('emp_id', 'ADLA02');
    if (syncError) {
      status.textContent = "Failed to sync ADLA02 HQ: " + syncError.message;
      return;
    }
  }


  status.textContent = `Initializing default employee passwords (to Employee ID)…`;
  // Set password for all loaded employees
  for (let i = 0; i < rows.length; i++) {
    const empId = rows[i].emp_id;
    if (empId) {
      await sb.rpc('set_password', { p_emp_id: empId.toString().trim(), p_password: empId.toString().trim() });
    }
    progBar.style.width = (50 + Math.round((i / rows.length) * 50)) + "%";
  }

  status.innerHTML = `<span style="color:var(--good);font-weight:600;">Done.</span> Successfully imported ${rows.length} employee records and set default passwords.`;
}

async function handleTargetUpload(e){
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById("targetUpStatus");
  const progBar = document.getElementById("targetProgBar");
  const targetsUrl = `${SUPABASE_URL}/rest/v1/targets`;
  const targetsHeaders = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };

  status.textContent = "Reading file...";
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws);

  if (rows.length === 0) {
    status.textContent = "The file is empty.";
    return;
  }

  const normalizeKey = k => k.toString().toLowerCase().trim().replace(/\s+/g,'_');
  const keyMap = {};
  Object.keys(rows[0]).forEach(k => { keyMap[normalizeKey(k)] = k; });

  const get = (row, col) => {
    const orig = keyMap[col];
    return orig !== undefined ? (row[orig] ?? '') : '';
  };
  const cleanText = (value) => {
    if (value === null || value === undefined) return '';
    return value
      .toString()
      .normalize('NFKC')
      .replace(/\\/g, '')
      .replace(/[\u0000-\u001F\u007F]/g, ' ')
      .replace(/[\uD800-\uDFFF]/g, '')
      .replace(/[^\x20-\x7E]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  };
  const cleanNumber = (value) => {
    const num = parseFloat(value);
    return Number.isFinite(num) ? num : 0;
  };

  const required = [
    'emp_id', 'hq_code', 'hq_name', 'brand', 'product_code', 'state',
    'region', 'no_of_be', 'month_num', 'month_name', 'year',
    'val_target_total', 'unit_target_total', 'val_target_per_be', 'unit_target_per_be'
  ];
  const missing = required.filter(col => !keyMap[col]);
  if (missing.length > 0) {
    status.textContent = `Error: Missing columns: ${missing.join(", ")}`;
    return;
  }

  if (!confirm(`This will replace ALL existing targets with ${rows.length} new rows. Continue?`)) {
    status.textContent = "Upload cancelled.";
    return;
  }

  status.textContent = "Clearing old target records...";
  const delResp = await fetch(`${targetsUrl}?id=gte.0`, {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    }
  });
  if (!delResp.ok) {
    status.textContent = "Failed to clear existing targets: " + (await delResp.text());
    return;
  }

  const batchSize = 250;
  let inserted = 0;
  const failedRows = [];
  status.textContent = `Uploading ${rows.length} target rows...`;
  const buildRow = (r) => ({
    emp_id: cleanText(get(r, 'emp_id')),
    hq_code: cleanText(get(r, 'hq_code')),
    hq_name: cleanText(get(r, 'hq_name')),
    brand: cleanText(get(r, 'brand')),
    product_code: cleanText(get(r, 'product_code')),
    state: cleanText(get(r, 'state')),
    region: cleanText(get(r, 'region')),
    no_of_be: cleanNumber(get(r, 'no_of_be')),
    month_num: parseInt(get(r, 'month_num')) || null,
    month_name: cleanText(get(r, 'month_name')),
    year: parseInt(get(r, 'year')) || null,
    val_target_total: cleanNumber(get(r, 'val_target_total')),
    unit_target_total: cleanNumber(get(r, 'unit_target_total')),
    val_target_per_be: cleanNumber(get(r, 'val_target_per_be')),
    unit_target_per_be: cleanNumber(get(r, 'unit_target_per_be'))
  });

  for (let i = 0; i < rows.length; i += batchSize) {
    const batch = rows.slice(i, i + batchSize).map(buildRow).filter(r => r.emp_id && r.hq_code && r.month_num && r.year);

    if (batch.length > 0) {
      const batchResp = await fetch(targetsUrl, {
        method: "POST",
        headers: targetsHeaders,
        body: JSON.stringify(batch)
      });
      if (!batchResp.ok) {
        const batchErrorText = await batchResp.text();
        console.warn('Batch insert failed, retrying row-by-row:', { startRow: i + 1, error: batchErrorText });
        let recovered = 0;
        for (let j = 0; j < batch.length; j++) {
          const row = batch[j];
          const rowResp = await fetch(targetsUrl, {
            method: "POST",
            headers: targetsHeaders,
            body: JSON.stringify([row])
          });
          if (!rowResp.ok) {
            const rowErrorText = await rowResp.text();
            failedRows.push({ rowNumber: i + j + 1, emp_id: row.emp_id, hq_code: row.hq_code, error: rowErrorText });
            console.warn('Target upload row skipped:', { rowNumber: i + j + 1, row, error: rowErrorText });
            continue;
          }
          recovered++;
        }
        inserted += recovered;
      } else {
        inserted += batch.length;
      }
    }

    progBar.style.width = Math.round((Math.min(i + batchSize, rows.length) / rows.length) * 100) + "%";
    status.textContent = `Uploaded ${Math.min(i + batchSize, rows.length)} of ${rows.length} target rows...`;
  }

  if (failedRows.length > 0) {
    const preview = failedRows.slice(0, 5).map(r => `${r.rowNumber} (${r.emp_id} / ${r.hq_code})`).join(", ");
    status.innerHTML = `<span style="color:var(--good);font-weight:600;">Done.</span> Imported ${inserted} target rows. Skipped ${failedRows.length} row(s): ${preview}${failedRows.length > 5 ? ", ..." : ""}`;
  } else {
    status.innerHTML = `<span style="color:var(--good);font-weight:600;">Done.</span> Successfully imported ${inserted} target rows.`;
  }
}

// ---------------- STOCKIST MAPPING UPLOAD ----------------
async function handleStockistMappingUpload(e){
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById("smUpStatus");
  const progBar = document.getElementById("smProgBar");

  status.textContent = "Reading file…";
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws);

  if (rows.length === 0) {
    status.textContent = "The file is empty.";
    return;
  }

  // Validate columns
  const firstRow = rows[0];
  const required = ['distributor_code', 'distributor_name', 'distributor_city', 'stockist_code', 'stockist_name', 'hq_code', 'hq_name'];
  const missing = required.filter(col => !(col in firstRow));
  if (missing.length > 0) {
    status.textContent = `Error: Missing columns: ${missing.join(", ")}`;
    return;
  }

  if (!confirm(`This will replace ALL stockist mapping records with ${rows.length} new rows. Continue?`)) {
    status.textContent = "Upload cancelled.";
    return;
  }

  // Step 1: Delete all existing records in batches to avoid RLS timeout issues
  status.textContent = "Clearing existing stockist mapping records…";
  let deleteFrom = 0;
  let totalDeleted = 0;
  while (true) {
    // Fetch a batch of stockist_codes to delete
    const { data: toDelete, error: fetchErr } = await sb
      .from('stockist_mapping')
      .select('stockist_code')
      .range(0, 199);
    if (fetchErr) {
      status.textContent = "Failed to fetch records for deletion: " + fetchErr.message;
      console.error('Delete fetch error:', fetchErr);
      return;
    }
    if (!toDelete || toDelete.length === 0) break;
    const codes = toDelete.map(r => r.stockist_code);
    const { error: delError } = await sb.from('stockist_mapping').delete().in('stockist_code', codes);
    if (delError) {
      status.textContent = "Failed to clear stockist mapping: " + delError.message;
      console.error('Delete error:', delError);
      return;
    }
    totalDeleted += codes.length;
    status.textContent = `Cleared ${totalDeleted} old records…`;
  }
  console.log(`Deleted ${totalDeleted} old stockist_mapping records`);

  // Step 2: Insert new records in batches
  status.textContent = `Uploading ${rows.length} stockist mapping records…`;
  const batchSize = 100;
  let totalInserted = 0;
  for (let i = 0; i < rows.length; i += batchSize) {
    const batch = rows.slice(i, i + batchSize).map(r => ({
      distributor_code: (r.distributor_code || '').toString().trim(),
      distributor_name: (r.distributor_name || '').toString().trim(),
      distributor_city: (r.distributor_city || '').toString().trim(),
      stockist_code: (r.stockist_code || '').toString().trim(),
      stockist_name: (r.stockist_name || '').toString().trim(),
      hq_code: (r.hq_code || '').toString().trim(),
      hq_name: (r.hq_name || '').toString().trim(),
      area: (r.area || '').toString().trim(),
      region: (r.region || '').toString().trim(),
      zone: (r.zone || '').toString().trim(),
      be_emp_id_1: (r.be_emp_id_1 || '').toString().trim() || null,
      be_emp_id_2: (r.be_emp_id_2 || '').toString().trim() || null,
      be_emp_id_3: (r.be_emp_id_3 || '').toString().trim() || null,
      asm_emp_id: (r.asm_emp_id || '').toString().trim() || null,
      rsm_emp_id: (r.rsm_emp_id || '').toString().trim() || null,
      zm_emp_id: (r.zm_emp_id || '').toString().trim() || null,
      vp_emp_id: (r.vp_emp_id || '').toString().trim() || null
    })).filter(r => r.stockist_code);

    if (batch.length > 0) {
      const { error: insError } = await sb.from('stockist_mapping').insert(batch);
      if (insError) {
        status.textContent = `Failed to insert batch at row ${i}: ` + insError.message;
        console.error('Insert error at row', i, insError);
        return;
      }
      totalInserted += batch.length;
    }

    progBar.style.width = Math.round(((i + batchSize) / rows.length) * 100) + "%";
    status.textContent = `Uploaded ${Math.min(i + batchSize, rows.length)} of ${rows.length} records…`;
  }

  console.log(`Inserted ${totalInserted} stockist_mapping records`);
  status.innerHTML = `<span style="color:var(--good);font-weight:600;">Done.</span> Successfully imported ${totalInserted} of ${rows.length} stockist mapping records.`;
}
